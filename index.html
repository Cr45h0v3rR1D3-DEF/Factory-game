const SAVE_KEY = "factoryDefenseSave_v1";
let toastText = "";
let toastTimer = 0;
function showToast(msg) { toastText = msg; toastTimer = 2000; }

function saveGame() {
  if (gameOver) return;
  const oreData = [];
  // Iterate the active region only — outside that range ore can never be set.
  for (let y = yMin; y < yMax; y++) {
    for (let x = xMin; x < xMax; x++) {
      const v = oreAt(x, y);
      if (v > 0) oreData.push([x, y, v]);
    }
  }
  const bData = [];
  const seenB = new Set();
  for (const b of buildings.values()) {
    if (seenB.has(b)) continue;
    seenB.add(b);
    bData.push({
      t: b.type, x: b.x, y: b.y, d: b.dir,
      it: b.item, ip: b.itemProgress || 0,
      bf: b.buffer || 0, ab: b.ammoBuf || 0, hb: b.heavyBuf || 0,
      am: b.ammo || 0, hp: b.hp || 0,
      oi: b.outputIndex || 0,
      nm: b.name || undefined,
    });
  }
  const data = {
    ore: oreData,
    buildings: bData,
    player: { x: player.x, y: player.y, hp: player.hp, facing: player.facing },
    stats: { oreMined: stats.oreMined, ammoProduced: stats.ammoProduced },
    wave: {
      n: waveState.waveNumber,
      next: waveState.nextWaveAt,
      spawning: waveState.spawning,
      count: waveState.spawnCount,
      spawned: waveState.spawned,
    },
    bounds: { xMin, yMin, xMax, yMax },
    train: train ? {
      inv: train.inventory,
      it: train.itemType,
      psi: train.parkedStationIndex,
      sch: train.schedule,
      si: train.scheduleIdx,
      fl: train.flipped ? 1 : 0,
    } : null,
    blueprints: blueprints,
    // Persist live zombies so a save mid-wave restores the in-progress fight.
    zombies: zombies.filter(z => !z.dead).map(z => ({
      x: z.x, y: z.y, hp: z.hp,
      ac: z.attackCd || 0,
      sp: z.speed || ZOMBIE_SPEED,
      bs: z.isBoss ? 1 : 0,
    })),
  };
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    showToast("Game saved");
  } catch (e) {
    showToast("Save failed");
  }
}

function loadGame() {
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) { showToast("No save found"); return; }
  let data;
  try { data = JSON.parse(raw); } catch (e) { showToast("Save corrupted"); return; }
  // Clear world
  clearAllOre();
  buildings.clear();
  uniqueBuildings.clear();
  zombies.length = 0;
  bullets.length = 0;
  playerBullets.length = 0;
  shells.length = 0;
  explosions.length = 0;
  // Restore active bounds (fallback to initial if missing in old saves)
  if (data.bounds) {
    xMin = data.bounds.xMin; yMin = data.bounds.yMin;
    xMax = data.bounds.xMax; yMax = data.bounds.yMax;
    recomputeWH();
  } else {
    setInitialActiveBounds();
  }
  // Restore ore
  for (const [x, y, n] of data.ore) setOre(x, y, n);
  // Restore wave FIRST so unlock checks (e.g. heavy turret) pass during placement
  waveState.waveNumber = data.wave.n;
  waveState.nextWaveAt = data.wave.next;
  waveState.spawning = false;
  waveState.spawned = data.wave.count || 0;
  waveState.spawnCount = data.wave.count || 0;
  // Reset station/train state before restoring
  stations.length = 0;
  train = null;
  blueprints = Array.isArray(data.blueprints) ? data.blueprints.filter(bp => bp && bp.name && Array.isArray(bp.items)) : [];
  // Restore buildings. For STATION we bypass the prompt by pre-stashing the saved name,
  // since placeBuilding asks via prompt() — temporarily stub it.
  // Set loadingBuildings so placeBuilding skips placement-time validations (e.g. depleted
  // miners would otherwise be dropped because their ore tile is now empty).
  loadingBuildings = true;
  const realPrompt = window.prompt;
  let nextStationName = null;
  window.prompt = () => nextStationName;
  for (const s of data.buildings) {
    if (s.t === BTYPE.STATION) nextStationName = s.nm || ("Station " + (stations.length + 1));
    placeBuilding(s.t, s.x, s.y, s.d);
    const b = buildingAt(s.x, s.y);
    if (!b) continue;
    if ("it" in s) b.item = s.it;
    if ("ip" in s) b.itemProgress = s.ip;
    if ("bf" in s) b.buffer = s.bf;
    if ("ab" in s) b.ammoBuf = s.ab;
    if ("hb" in s) b.heavyBuf = s.hb;
    if ("am" in s) b.ammo = s.am;
    if ("hp" in s && s.t === BTYPE.WALL) b.hp = s.hp;
    if ("oi" in s) b.outputIndex = s.oi;
  }
  window.prompt = realPrompt;
  loadingBuildings = false;
  // Restore train state if saved
  if (data.train && stations.length >= 2) {
    ensureTrain();
    if (train) {
      train.inventory = Math.max(0, Math.min(TRAIN_INVENTORY_MAX, data.train.inv || 0));
      train.itemType = (data.train.it != null && train.inventory > 0) ? data.train.it : null;
      train.flipped = !!data.train.fl;
      train.parkedStationIndex = (data.train.psi != null && stations[data.train.psi]) ? data.train.psi : 0;
      train.scheduleIdx = data.train.si || 0;
      if (Array.isArray(data.train.sch) && data.train.sch.length === 2) {
        train.schedule = data.train.sch;
      }
      train.status = "parked";
      positionTrainAtStation(train.parkedStationIndex);
    }
  }
  // Player
  player.x = data.player.x; player.y = data.player.y;
  player.hp = data.player.hp; player.facing = data.player.facing;
  player.noZombieTimer = 0;
  // Stats
  stats.oreMined = data.stats.oreMined;
  stats.ammoProduced = data.stats.ammoProduced;
  // Restore live zombies (skipped if missing — older saves had no zombies field).
  if (Array.isArray(data.zombies)) {
    for (const z of data.zombies) {
      zombies.push({
        x: z.x, y: z.y,
        hp: z.hp,
        dead: false, fade: 400,
        attackCd: z.ac || 0,
        bob: Math.random() * Math.PI * 2,
        speed: z.sp || ZOMBIE_SPEED,
        isBoss: !!z.bs,
      });
    }
  }
  // (wave already restored before building placement)
  if (gameOver) {
    gameOver = false;
    document.getElementById("overlay").innerHTML = "";
  }
  showToast("Game loaded");
}

// ============================================================
// Stats / GameOver
// ============================================================
const stats = { oreMined: 0, ammoProduced: 0 };

function triggerGameOver() {
  gameOver = true;
  const overlay = document.getElementById("overlay");
  overlay.innerHTML = `<div class="panel">You survived ${waveState.waveNumber} waves.<br><button id="restart">Restart</button></div>`;
  document.getElementById("restart").onclick = () => location.reload();
}

// ============================================================
// Player update
// ============================================================
function updateCamera() {
  camX = player.x - VIEW_W / 2;
  camY = player.y - VIEW_H / 2;
  const minCamX = xMin * TILE, minCamY = yMin * TILE;
  const maxCamX = xMax * TILE - VIEW_W, maxCamY = yMax * TILE - VIEW_H;
  if (camX < minCamX) camX = minCamX;
  if (camY < minCamY) camY = minCamY;
  if (camX > maxCamX) camX = maxCamX;
  if (camY > maxCamY) camY = maxCamY;
  // refresh mouse world coords (camera may have moved)
  mouseX = mouseScreenX + camX;
  mouseY = mouseScreenY + camY;
  mouseTileX = Math.floor(mouseX / TILE);
  mouseTileY = Math.floor(mouseY / TILE);
}

function tickPlayer(dt) {
  let dx = 0, dy = 0;
  if (keys["w"]) dy -= 1;
  if (keys["s"]) dy += 1;
  if (keys["a"]) dx -= 1;
  if (keys["d"]) dx += 1;
  if (dx || dy) {
    const len = Math.hypot(dx, dy);
    dx /= len; dy /= len;
    player.x += dx * PLAYER_SPEED * dt;
    player.y += dy * PLAYER_SPEED * dt;
    if (Math.abs(dx) > Math.abs(dy)) player.facing = dx > 0 ? DIR.RIGHT : DIR.LEFT;
    else player.facing = dy > 0 ? DIR.DOWN : DIR.UP;
  }
  const pad = TILE * 0.4;
  const minPx = xMin * TILE + pad, minPy = yMin * TILE + pad;
  const maxPx = xMax * TILE - pad, maxPy = yMax * TILE - pad;
  if (player.x < minPx) player.x = minPx;
  if (player.y < minPy) player.y = minPy;
  if (player.x > maxPx) player.x = maxPx;
  if (player.y > maxPy) player.y = maxPy;
}

function handleClicks() {
  if (leftClickQueued) {
    leftClickQueued = false;
    if (inBounds(mouseTileX, mouseTileY)) {
      // Blueprint capture: click two corners of the rectangle.
      if (blueprintCapture) {
        if (!blueprintCapture.start) {
          blueprintCapture.start = { x: mouseTileX, y: mouseTileY };
          showToast("Click 2nd corner");
        } else {
          const bp = buildBlueprintFromRect(
            blueprintCapture.start.x, blueprintCapture.start.y,
            mouseTileX, mouseTileY, blueprintCapture.name);
          if (bp.items.length === 0) {
            showToast("Empty area — capture cancelled");
          } else {
            blueprints.push(bp);
            showToast("Saved \"" + bp.name + "\" (" + bp.items.length + " bldgs)");
          }
          blueprintCapture = null;
        }
        return;
      }
      // Blueprint place: anchor is the cursor tile.
      if (blueprintPlace) {
        const placed = placeBlueprintAt(blueprintPlace, mouseTileX, mouseTileY);
        showToast("Placed " + placed + "/" + blueprintPlace.items.length);
        return;
      }
      // Click on a station opens the schedule modal.
      const clicked = buildingAt(mouseTileX, mouseTileY);
      if (clicked && clicked.type === BTYPE.STATION) {
        openScheduleModal();
      } else if (selectedBuilding === BTYPE.RAIL) {
        // Two-click rail tool flow.
        if (!railToolStart) {
          railToolStart = { x: mouseTileX, y: mouseTileY };
        } else {
          const path = findRailPath(railToolStart, { x: mouseTileX, y: mouseTileY });
          if (!path) {
            showToast("No rail path");
          } else {
            for (const cell of path) placeBuilding(BTYPE.RAIL, cell.x, cell.y, DIR.RIGHT);
          }
          railToolStart = null;
        }
      } else {
        placeBuilding(selectedBuilding, mouseTileX, mouseTileY, placementDir);
      }
    }
  }
  if (rightClickQueued) {
    rightClickQueued = false;
    if (blueprintPlace) { blueprintPlace = null; showToast("Cancelled"); }
    else if (blueprintCapture) { blueprintCapture = null; showToast("Capture cancelled"); }
    else if (selectedBuilding === BTYPE.RAIL && railToolStart) {
      railToolStart = null; // cancel rail laying
    } else if (inBounds(mouseTileX, mouseTileY)) {
      removeBuilding(mouseTileX, mouseTileY);
    }
  }
  // Right-button held: delete any building under the cursor while dragging.
  if (rightHeld && !scheduleModalOpen && !blueprintModalOpen && !blueprintCapture && !blueprintPlace
      && !gameOver && !paused && inBounds(mouseTileX, mouseTileY)) {
    if (!(selectedBuilding === BTYPE.RAIL && railToolStart)) {
      removeBuilding(mouseTileX, mouseTileY);
    }
  }
  // Left-button held: drag-place buildings under the cursor (no-ops if the spot's already filled).
  if (leftHeld && !leftClickQueued && !scheduleModalOpen && !blueprintModalOpen && !blueprintCapture
      && !blueprintPlace && !showMap && !gameOver && !paused
      && inBounds(mouseTileX, mouseTileY) && selectedBuilding !== BTYPE.RAIL) {
    const here = buildingAt(mouseTileX, mouseTileY);
    if (!(here && here.type === BTYPE.STATION)) {
      placeBuilding(selectedBuilding, mouseTileX, mouseTileY, placementDir);
    }
  }
}

// ============================================================
// Render
// ============================================================
function drawShadow(x, y, w, h) {
  ctx.fillStyle = COL.shadow;
  ctx.fillRect(x + 2, y + 2, w, h);
}

function drawGround() {
  const x0 = Math.max(xMin, Math.floor(camX / TILE));
  const y0 = Math.max(yMin, Math.floor(camY / TILE));
  const x1 = Math.min(xMax, Math.ceil((camX + VIEW_W) / TILE));
  const y1 = Math.min(yMax, Math.ceil((camY + VIEW_H) / TILE));
  ctx.fillStyle = COL.ground;
  ctx.fillRect(x0*TILE, y0*TILE, (x1-x0)*TILE, (y1-y0)*TILE);
  // subtle grid
  ctx.strokeStyle = COL.grid;
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = x0; x <= x1; x++) { ctx.moveTo(x*TILE, y0*TILE); ctx.lineTo(x*TILE, y1*TILE); }
  for (let y = y0; y <= y1; y++) { ctx.moveTo(x0*TILE, y*TILE); ctx.lineTo(x1*TILE, y*TILE); }
  ctx.stroke();
  // ore
  for (let y = y0; y < y1; y++) {
    for (let x = x0; x < x1; x++) {
      if (oreAt(x, y) > 0) {
        ctx.fillStyle = COL.oreTile;
        ctx.fillRect(x*TILE, y*TILE, TILE, TILE);
        ctx.fillStyle = COL.oreDot;
        ctx.fillRect(x*TILE+5, y*TILE+5, 3, 3);
        ctx.fillRect(x*TILE+15, y*TILE+8, 3, 3);
        ctx.fillRect(x*TILE+8, y*TILE+15, 3, 3);
        ctx.fillRect(x*TILE+17, y*TILE+17, 3, 3);
      }
    }
  }
}

function isRailLikeBuilding(b) {
  return !!b && (b.type === BTYPE.RAIL || b.type === BTYPE.STATION);
}

// Rail visual constants — chunky factorio-flavoured rails.
// Gauge kept smaller than TILE/2 so a corner's inner-rail arc still has visible radius.
const RAIL_GAUGE = 9;        // half-distance between the two metal rails
const RAIL_LINE_W = 6;       // metal rail thickness
const TIE_LEN = 24;          // sleeper length (perpendicular to rails) — full tile
const TIE_W = 7;             // sleeper width (along rails)
const TIE_SPACING = 9;       // gap between sleeper centers
const COL_GRAVEL = "#3a3027";
const COL_TIE = "#7a4a1f";
const COL_RAIL = "#dcdcdc";

// Draw a rail tile, factorio-flavoured. 1-cell-wide track.
// Renders straight runs as continuous double-rails with brown wooden ties; renders corners as
// curves; renders T/cross junctions as a straight axis with stubs; renders isolated stubs cleanly.
// True only if neighbor in `dir` should logically connect to this rail tile.
// Rejects "parallel run" neighbors: if both this tile and the neighbor have rails
// in the perpendicular axis, they're side-by-side parallel tracks, not a junction.
function railConnects(b, dir) {
  const dxs = [0, 1, 0, -1], dys = [-1, 0, 1, 0];
  const nx = b.x + dxs[dir], ny = b.y + dys[dir];
  const n = buildingAt(nx, ny);
  if (!n || (n.type !== BTYPE.RAIL && n.type !== BTYPE.STATION)) return false;
  if (n.type === BTYPE.STATION) return true;
  // Perpendicular directions to `dir`.
  const p1 = (dir + 1) % 4, p2 = (dir + 3) % 4;
  const thisHasPerp = isRailLikeBuilding(buildingAt(b.x + dxs[p1], b.y + dys[p1]))
                   || isRailLikeBuilding(buildingAt(b.x + dxs[p2], b.y + dys[p2]));
  const nbHasPerp = isRailLikeBuilding(buildingAt(nx + dxs[p1], ny + dys[p1]))
                 || isRailLikeBuilding(buildingAt(nx + dxs[p2], ny + dys[p2]));
  // Both parallel tracks → don't connect.
  if (thisHasPerp && nbHasPerp) return false;
  return true;
}

function drawRailTile(b, px, py) {
  const cx = px + TILE/2, cy = py + TILE/2;
  // Gravel base — fills the whole tile so adjacent tiles tile seamlessly.
  ctx.fillStyle = COL_GRAVEL;
  ctx.fillRect(px, py, TILE, TILE);

  const conn = [
    railConnects(b, 0),
    railConnects(b, 1),
    railConnects(b, 2),
    railConnects(b, 3),
  ];
  const dirs = [];
  for (let i = 0; i < 4; i++) if (conn[i]) dirs.push(i);

  ctx.lineCap = "butt";

  if (dirs.length === 0) return; // bare gravel for orphans

  if (dirs.length === 2 && (dirs[0] + 2) % 4 === dirs[1]) {
    // straight (opposite directions)
    drawStraightRail(px, py, dirs[0]);
  } else if (dirs.length === 2) {
    // corner (perpendicular pair)
    drawCornerRail(px, py, dirs[0], dirs[1]);
  } else if (dirs.length === 1) {
    drawStubRail(px, py, dirs[0]);
  } else {
    // 3-way (T) or 4-way: pick whichever opposite-pair is connected as the through axis,
    // draw it as a straight, and add half-stubs for the perpendicular branches.
    let mainDir = -1;
    if (conn[0] && conn[2]) mainDir = 0; // up-down
    else if (conn[1] && conn[3]) mainDir = 1; // left-right
    if (mainDir >= 0) drawStraightRail(px, py, mainDir);
    for (let i = 0; i < 4; i++) {
      if (!conn[i]) continue;
      if (mainDir >= 0 && (i === mainDir || i === (mainDir + 2) % 4)) continue;
      drawStubRail(px, py, i, true);
    }
  }
}

function drawStraightRail(px, py, dir) {
  const cx = px + TILE/2, cy = py + TILE/2;
  const horizontal = (dir === 1 || dir === 3);
  // Sleepers — perpendicular to rails.
  ctx.fillStyle = COL_TIE;
  if (horizontal) {
    for (let tx = px + Math.floor(TIE_SPACING / 2); tx < px + TILE - 1; tx += TIE_SPACING) {
      ctx.fillRect(tx, cy - TIE_LEN/2, TIE_W, TIE_LEN);
    }
  } else {
    for (let ty = py + Math.floor(TIE_SPACING / 2); ty < py + TILE - 1; ty += TIE_SPACING) {
      ctx.fillRect(cx - TIE_LEN/2, ty, TIE_LEN, TIE_W);
    }
  }
  // Two metal rails.
  ctx.strokeStyle = COL_RAIL;
  ctx.lineWidth = RAIL_LINE_W;
  ctx.beginPath();
  if (horizontal) {
    ctx.moveTo(px, cy - RAIL_GAUGE); ctx.lineTo(px + TILE, cy - RAIL_GAUGE);
    ctx.moveTo(px, cy + RAIL_GAUGE); ctx.lineTo(px + TILE, cy + RAIL_GAUGE);
  } else {
    ctx.moveTo(cx - RAIL_GAUGE, py); ctx.lineTo(cx - RAIL_GAUGE, py + TILE);
    ctx.moveTo(cx + RAIL_GAUGE, py); ctx.lineTo(cx + RAIL_GAUGE, py + TILE);
  }
  ctx.stroke();
}

function drawCornerRail(px, py, d1, d2) {
  const cx = px + TILE/2, cy = py + TILE/2;
  const dxs = [0, 1, 0, -1], dys = [-1, 0, 1, 0];
  // Arc center: corner of tile where the dir1 edge meets the dir2 edge.
  const arcCx = cx + (dxs[d1] + dxs[d2]) * (TILE/2);
  const arcCy = cy + (dys[d1] + dys[d2]) * (TILE/2);
  // Start/end angles: from arc center toward the midpoint of each direction's edge.
  const dir1MidX = cx + dxs[d1] * (TILE/2);
  const dir1MidY = cy + dys[d1] * (TILE/2);
  const dir2MidX = cx + dxs[d2] * (TILE/2);
  const dir2MidY = cy + dys[d2] * (TILE/2);
  const startAngle = Math.atan2(dir1MidY - arcCy, dir1MidX - arcCx);
  const endAngle   = Math.atan2(dir2MidY - arcCy, dir2MidX - arcCx);
  // Choose direction that takes the short (90°) path.
  let delta = endAngle - startAngle;
  while (delta > Math.PI) delta -= 2 * Math.PI;
  while (delta < -Math.PI) delta += 2 * Math.PI;
  const ccw = delta < 0;
  const sweep = Math.abs(delta);
  const innerR = TILE/2 - RAIL_GAUGE;
  const outerR = TILE/2 + RAIL_GAUGE;

  // Sleepers along the curve, perpendicular to the rails (i.e. radial).
  ctx.fillStyle = COL_TIE;
  const arcLen = sweep * (TILE/2);
  const numTies = Math.max(2, Math.round(arcLen / TIE_SPACING));
  for (let i = 0; i < numTies; i++) {
    const t = (i + 0.5) / numTies;
    const angle = startAngle + (ccw ? -t * sweep : t * sweep);
    const tx = arcCx + (TILE/2) * Math.cos(angle);
    const ty = arcCy + (TILE/2) * Math.sin(angle);
    ctx.save();
    ctx.translate(tx, ty);
    // Sleeper's long axis is along the radius (perpendicular to track).
    ctx.rotate(angle);
    ctx.fillRect(-TIE_LEN / 2, -TIE_W / 2, TIE_LEN, TIE_W);
    ctx.restore();
  }

  // Two metal rails — proper circular arcs.
  ctx.strokeStyle = COL_RAIL;
  ctx.lineWidth = RAIL_LINE_W;
  ctx.beginPath();
  ctx.arc(arcCx, arcCy, innerR, startAngle, endAngle, ccw);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(arcCx, arcCy, outerR, startAngle, endAngle, ccw);
  ctx.stroke();
}

function drawStubRail(px, py, dir, skipTies) {
  const cx = px + TILE/2, cy = py + TILE/2;
  const dxs = [0, 1, 0, -1], dys = [-1, 0, 1, 0];
  const dx = dxs[dir], dy = dys[dir];
  const perpX = -dy, perpY = dx;
  // Half-tile of sleepers from center to edge in direction `dir`.
  if (!skipTies) {
    ctx.fillStyle = COL_TIE;
    const horizontal = (dir === 1 || dir === 3);
    if (horizontal) {
      const start = dx > 0 ? cx + Math.floor(TIE_SPACING / 2) : px + Math.floor(TIE_SPACING / 2);
      const end = dx > 0 ? px + TILE - 1 : cx;
      for (let tx = start; tx < end; tx += TIE_SPACING) ctx.fillRect(tx, cy - TIE_LEN/2, TIE_W, TIE_LEN);
    } else {
      const start = dy > 0 ? cy + Math.floor(TIE_SPACING / 2) : py + Math.floor(TIE_SPACING / 2);
      const end = dy > 0 ? py + TILE - 1 : cy;
      for (let ty = start; ty < end; ty += TIE_SPACING) ctx.fillRect(cx - TIE_LEN/2, ty, TIE_LEN, TIE_W);
    }
  }
  // Two rails from tile center to edge.
  ctx.strokeStyle = COL_RAIL;
  ctx.lineWidth = RAIL_LINE_W;
  ctx.beginPath();
  ctx.moveTo(cx + perpX * RAIL_GAUGE, cy + perpY * RAIL_GAUGE);
  ctx.lineTo(cx + dx * (TILE/2) + perpX * RAIL_GAUGE, cy + dy * (TILE/2) + perpY * RAIL_GAUGE);
  ctx.moveTo(cx - perpX * RAIL_GAUGE, cy - perpY * RAIL_GAUGE);
  ctx.lineTo(cx + dx * (TILE/2) - perpX * RAIL_GAUGE, cy + dy * (TILE/2) - perpY * RAIL_GAUGE);
  ctx.stroke();
}

function drawBuilding(b) {
  const px = b.x * TILE, py = b.y * TILE;
  drawShadow(px, py, TILE, TILE);
  if (b.type === BTYPE.MINER) {
    ctx.fillStyle = COL.miner;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.strokeStyle = "#3a2d18";
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      const lx = px + 6 + i*6;
      ctx.beginPath();
      ctx.moveTo(lx, py + 6);
      ctx.lineTo(lx, py + TILE - 6);
      ctx.stroke();
    }
    // facing arrow indicator
    ctx.fillStyle = "#ffcc66";
    drawArrow(px + TILE/2, py + TILE/2, b.dir, 5);
    // Out-of-ore indicator: pulsing red badge in the top-right corner of the miner.
    if (oreAt(b.x, b.y) <= 0) {
      const pulse = 0.65 + 0.35 * Math.sin(performance.now() / 200);
      ctx.globalAlpha = pulse;
      ctx.fillStyle = "#d23030";
      ctx.beginPath();
      ctx.arc(px + TILE - 5, py + 5, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#000";
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = "#fff";
      ctx.font = "bold 8px ui-monospace, Consolas, monospace";
      ctx.textBaseline = "middle";
      ctx.textAlign = "center";
      ctx.fillText("!", px + TILE - 5, py + 5);
      ctx.textAlign = "start";
      ctx.textBaseline = "top";
      ctx.globalAlpha = 1;
    }
  } else if (b.type === BTYPE.BELT) {
    ctx.fillStyle = COL.belt;
    ctx.fillRect(px, py, TILE, TILE);
    // animated arrow position
    const phase = b.item != null ? b.itemProgress : (performance.now() % BELT_INTERVAL) / BELT_INTERVAL;
    const offX = (DX[b.dir]) * (phase - 0.5) * TILE * 0.4;
    const offY = (DY[b.dir]) * (phase - 0.5) * TILE * 0.4;
    ctx.fillStyle = COL.beltArrow;
    drawArrow(px + TILE/2 + offX, py + TILE/2 + offY, b.dir, 6);
    if (b.item != null) {
      // item position along belt (moves from "in" side to "out" side)
      const startX = px + TILE/2 - DX[b.dir] * TILE/2;
      const startY = py + TILE/2 - DY[b.dir] * TILE/2;
      const endX = px + TILE/2 + DX[b.dir] * TILE/2;
      const endY = py + TILE/2 + DY[b.dir] * TILE/2;
      const ix = startX + (endX - startX) * b.itemProgress;
      const iy = startY + (endY - startY) * b.itemProgress;
      drawItem(ix, iy, b.item);
    }
  } else if (b.type === BTYPE.ASSEMBLER) {
    ctx.fillStyle = COL.assembler;
    ctx.fillRect(px, py, TILE, TILE);
    // cog
    ctx.strokeStyle = "#3a1d10";
    ctx.lineWidth = 2;
    const cx = px + TILE/2, cy = py + TILE/2;
    const r = 6;
    ctx.beginPath();
    for (let i = 0; i < 8; i++) {
      const a = i * Math.PI / 4;
      const a2 = a + Math.PI / 8;
      ctx.moveTo(cx + Math.cos(a)*r, cy + Math.sin(a)*r);
      ctx.lineTo(cx + Math.cos(a)*(r+3), cy + Math.sin(a)*(r+3));
      ctx.moveTo(cx + Math.cos(a2)*r, cy + Math.sin(a2)*r);
    }
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();
    // output direction tick
    ctx.fillStyle = "#ffeecc";
    drawArrow(cx + DX[b.dir]*7, cy + DY[b.dir]*7, b.dir, 3);
    // Crafting progress bar underneath the assembler — only shown while actively crafting.
    if (b.craftMax && b.craftMax > 0) {
      const progress = Math.max(0, Math.min(1, 1 - b.cooldown / b.craftMax));
      const barY = py + TILE - 3;
      ctx.fillStyle = "#222";
      ctx.fillRect(px + 1, barY, TILE - 2, 3);
      ctx.fillStyle = "#7fff7f";
      ctx.fillRect(px + 1, barY, (TILE - 2) * progress, 3);
    }
  } else if (b.type === BTYPE.TURRET) {
    ctx.fillStyle = COL.turret;
    ctx.fillRect(px, py, TILE, TILE);
    const cx = px + TILE/2, cy = py + TILE/2;
    ctx.fillStyle = "#222";
    ctx.beginPath();
    ctx.arc(cx, cy, 6, 0, Math.PI * 2);
    ctx.fill();
    // barrel
    ctx.strokeStyle = "#bbb";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(b.barrelAngle) * 10, cy + Math.sin(b.barrelAngle) * 10);
    ctx.stroke();
    // ammo dots
    ctx.fillStyle = COL.ammo;
    const dots = Math.min(4, Math.ceil(b.ammo / 5));
    for (let i = 0; i < dots; i++) {
      ctx.fillRect(px + 2 + i*4, py + 2, 3, 3);
    }
  } else if (b.type === BTYPE.BIG_DRILL) {
    const baseX = b.x * TILE, baseY = b.y * TILE;
    const sz = 3 * TILE;
    const cx = baseX + sz / 2, cy = baseY + sz / 2;
    const t = performance.now();
    drawShadow(baseX, baseY, sz, sz);
    // Faint range ring showing the 5×5 mining area.
    ctx.strokeStyle = "rgba(255, 200, 80, 0.22)";
    ctx.lineWidth = 1;
    ctx.strokeRect(baseX - TILE + 1, baseY - TILE + 1, sz + 2 * TILE - 2, sz + 2 * TILE - 2);
    // Beveled industrial base — outer dark frame, inner lighter plate.
    ctx.fillStyle = "#2a1d10";
    ctx.fillRect(baseX, baseY, sz, sz);
    ctx.fillStyle = "#5a4028";
    ctx.fillRect(baseX + 4, baseY + 4, sz - 8, sz - 8);
    // Output chutes — short dark bars at each cardinal mid-edge to suggest exhaust ports.
    ctx.fillStyle = "#1a1208";
    ctx.fillRect(cx - 8, baseY - 2,   16, 7);            // top
    ctx.fillRect(cx - 8, baseY + sz - 5, 16, 7);          // bottom
    ctx.fillRect(baseX - 2,    cy - 8, 7, 16);            // left
    ctx.fillRect(baseX + sz - 5, cy - 8, 7, 16);          // right
    // Corner rivets.
    ctx.fillStyle = "#181008";
    for (const [rx, ry] of [[8, 8], [sz - 8, 8], [8, sz - 8], [sz - 8, sz - 8]]) {
      ctx.beginPath();
      ctx.arc(baseX + rx, baseY + ry, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = "#5a4028";
    for (const [rx, ry] of [[8, 8], [sz - 8, 8], [8, sz - 8], [sz - 8, sz - 8]]) {
      ctx.beginPath();
      ctx.arc(baseX + rx - 0.5, baseY + ry - 0.5, 1.2, 0, Math.PI * 2);
      ctx.fill();
    }
    // Big rotating gear (slow).
    const angOuter = (t / 1200);
    const outerR = 24;
    const teeth = 12;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angOuter);
    // Gear teeth
    ctx.fillStyle = "#3a2818";
    for (let i = 0; i < teeth; i++) {
      const a = (i / teeth) * Math.PI * 2;
      ctx.save();
      ctx.rotate(a);
      ctx.fillRect(outerR - 2, -3, 5, 6);
      ctx.restore();
    }
    // Gear body
    ctx.fillStyle = "#7a5a38";
    ctx.beginPath(); ctx.arc(0, 0, outerR - 1, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "#2a1a0a";
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Spokes on the outer gear
    ctx.strokeStyle = "#3a2818";
    ctx.lineWidth = 2;
    for (let i = 0; i < 4; i++) {
      const a = (i / 4) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * 6, Math.sin(a) * 6);
      ctx.lineTo(Math.cos(a) * (outerR - 4), Math.sin(a) * (outerR - 4));
      ctx.stroke();
    }
    ctx.restore();
    // Counter-rotating inner ring.
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(-angOuter * 2.2);
    ctx.fillStyle = "#3a2818";
    ctx.beginPath(); ctx.arc(0, 0, 13, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "#1a1208";
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Inner gear teeth
    ctx.fillStyle = "#5a4028";
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2;
      ctx.save();
      ctx.rotate(a);
      ctx.fillRect(11, -2, 4, 4);
      ctx.restore();
    }
    ctx.restore();
    // Fast-spinning drill bit at the very center.
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(t / 60);
    ctx.fillStyle = "#cfd0d4";
    ctx.beginPath();
    for (let i = 0; i < 3; i++) {
      const a = (i / 3) * Math.PI * 2;
      const a2 = a + (Math.PI * 2 / 6);
      ctx.lineTo(Math.cos(a) * 8, Math.sin(a) * 8);
      ctx.lineTo(Math.cos(a2) * 3, Math.sin(a2) * 3);
    }
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = "#222";
    ctx.lineWidth = 1;
    ctx.stroke();
    // Center hub
    ctx.fillStyle = "#1a1a1a";
    ctx.beginPath(); ctx.arc(0, 0, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    // Pulsing status lights at the 4 cardinal mid-edges (between the chute bars).
    const pulse = 0.55 + 0.45 * Math.sin(t / 280);
    ctx.fillStyle = "rgba(120, 255, 120, " + (0.55 + 0.4 * pulse) + ")";
    ctx.beginPath(); ctx.arc(baseX + 8,        cy,            2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(baseX + sz - 8,   cy,            2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx,               baseY + 8,     2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx,               baseY + sz - 8, 2, 0, Math.PI * 2); ctx.fill();
    // Out-of-ore indicator: pulsing red badge in the top-right corner if 5x5 range is empty.
    if (bigDrillDepleted(b)) {
      const pulseI = 0.65 + 0.35 * Math.sin(t / 200);
      ctx.globalAlpha = pulseI;
      ctx.fillStyle = "#d23030";
      ctx.beginPath();
      ctx.arc(baseX + sz - 8, baseY + 8, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#000";
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = "#fff";
      ctx.font = "bold 11px ui-monospace, Consolas, monospace";
      ctx.textBaseline = "middle";
      ctx.textAlign = "center";
      ctx.fillText("!", baseX + sz - 8, baseY + 8);
      ctx.textAlign = "start";
      ctx.textBaseline = "top";
      ctx.globalAlpha = 1;
    }
  } else if (b.type === BTYPE.HEAVY_ASSEMBLER) {
    const baseX = b.x * TILE, baseY = b.y * TILE;
    const sz = 2 * TILE;
    drawShadow(baseX, baseY, sz, sz);
    ctx.fillStyle = "#7a3a18";
    ctx.fillRect(baseX, baseY, sz, sz);
    ctx.strokeStyle = "#3a1d10";
    ctx.lineWidth = 2;
    ctx.strokeRect(baseX + 1, baseY + 1, sz - 2, sz - 2);
    const cxA = baseX + sz / 2, cyA = baseY + sz / 2;
    // Cog (bigger version of the regular assembler's)
    ctx.strokeStyle = "#3a1d10";
    ctx.lineWidth = 3;
    const r = 12;
    ctx.beginPath();
    for (let i = 0; i < 8; i++) {
      const a = i * Math.PI / 4;
      ctx.moveTo(cxA + Math.cos(a) * r, cyA + Math.sin(a) * r);
      ctx.lineTo(cxA + Math.cos(a) * (r + 4), cyA + Math.sin(a) * (r + 4));
    }
    ctx.arc(cxA, cyA, r, 0, Math.PI * 2);
    ctx.stroke();
    // Output direction marker (bigger arrow at the facing edge)
    ctx.fillStyle = "#ffeecc";
    drawArrow(cxA + DX[b.dir] * (sz / 2 - 4), cyA + DY[b.dir] * (sz / 2 - 4), b.dir, 6);
    // Crafting progress bar across the bottom edge.
    if (b.craftMax && b.craftMax > 0) {
      const progress = Math.max(0, Math.min(1, 1 - b.cooldown / b.craftMax));
      const barY = baseY + sz - 4;
      ctx.fillStyle = "#222";
      ctx.fillRect(baseX + 2, barY, sz - 4, 4);
      ctx.fillStyle = "#7fff7f";
      ctx.fillRect(baseX + 2, barY, (sz - 4) * progress, 4);
    }
    // Buffer dots — heavy ammo (orange) top-left, ore (silver) top-right.
    ctx.fillStyle = "#ff8800";
    for (let i = 0; i < Math.min(8, b.heavyBuf || 0); i++) ctx.fillRect(baseX + 3 + i * 4, baseY + 3, 3, 3);
    ctx.fillStyle = "#c0c0c0";
    for (let i = 0; i < Math.min(8, b.buffer || 0); i++) ctx.fillRect(baseX + sz - 3 - (i + 1) * 4, baseY + 3, 3, 3);
  } else if (b.type === BTYPE.ARTILLERY) {
    // 3x3 base — only render when this iteration is the anchor cell (handled by `seen` dedup
    // in render(), so we just draw at the anchor position once).
    if (b.x * TILE !== px || b.y * TILE !== py) {
      // shouldn't happen since drawBuilding is called with anchor coords, but guard anyway
    }
    const baseX = b.x * TILE, baseY = b.y * TILE;
    const baseSize = 3 * TILE;
    drawShadow(baseX, baseY, baseSize, baseSize);
    ctx.fillStyle = "#3a4632";
    ctx.fillRect(baseX, baseY, baseSize, baseSize);
    ctx.strokeStyle = "#1f2818";
    ctx.lineWidth = 2;
    ctx.strokeRect(baseX + 1, baseY + 1, baseSize - 2, baseSize - 2);
    const cxA = baseX + baseSize / 2, cyA = baseY + baseSize / 2;
    // Hub
    ctx.fillStyle = "#1a1a1a";
    ctx.beginPath();
    ctx.arc(cxA, cyA, 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#444";
    ctx.lineWidth = 2;
    ctx.stroke();
    // Long barrel — extends well past the 3×3 base.
    const barrelLen = 4 * TILE;
    const ang = b.barrelAngle;
    ctx.strokeStyle = "rgba(0,0,0,0.45)";
    ctx.lineWidth = 9;
    ctx.beginPath();
    ctx.moveTo(cxA + 2, cyA + 3);
    ctx.lineTo(cxA + Math.cos(ang) * barrelLen + 2, cyA + Math.sin(ang) * barrelLen + 3);
    ctx.stroke();
    ctx.strokeStyle = "#bbb";
    ctx.lineWidth = 7;
    ctx.beginPath();
    ctx.moveTo(cxA, cyA);
    ctx.lineTo(cxA + Math.cos(ang) * barrelLen, cyA + Math.sin(ang) * barrelLen);
    ctx.stroke();
    // Muzzle cap
    ctx.fillStyle = "#222";
    ctx.beginPath();
    ctx.arc(cxA + Math.cos(ang) * barrelLen, cyA + Math.sin(ang) * barrelLen, 4, 0, Math.PI * 2);
    ctx.fill();
    // Buffers (heavy ammo dots top-left, ore dots top-right)
    ctx.fillStyle = "#ff8800";
    for (let i = 0; i < Math.min(10, b.ammoBuf || 0); i++) ctx.fillRect(baseX + 3 + i * 5, baseY + 3, 4, 4);
    ctx.fillStyle = "#c0c0c0";
    for (let i = 0; i < Math.min(10, b.buffer || 0); i++) ctx.fillRect(baseX + 3 + i * 5, baseY + baseSize - 7, 3, 3);
  } else if (b.type === BTYPE.SNIPER_TURRET) {
    // 1x1 base
    ctx.fillStyle = "#444";
    ctx.fillRect(px, py, TILE, TILE);
    ctx.strokeStyle = "#222";
    ctx.lineWidth = 2;
    ctx.strokeRect(px + 1, py + 1, TILE - 2, TILE - 2);
    const cx = px + TILE/2, cy = py + TILE/2;
    // Barrel: 2 tiles long, drawn HIGH (after base, no occlusion). Recoil pulls it back briefly.
    const recoilFrac = b.recoilT > 0 ? b.recoilT / SNIPER_RECOIL_MS : 0;
    const recoilOffset = -recoilFrac * 6; // pull back when recoiling
    const ang = b.barrelAngle;
    const baseX = cx + Math.cos(ang) * recoilOffset;
    const baseY = cy + Math.sin(ang) * recoilOffset;
    const tipX = baseX + Math.cos(ang) * (TILE * 2);
    const tipY = baseY + Math.sin(ang) * (TILE * 2);
    // shadow under barrel for "high" feel
    ctx.strokeStyle = "rgba(0,0,0,0.35)";
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(baseX + 2, baseY + 3);
    ctx.lineTo(tipX + 2, tipY + 3);
    ctx.stroke();
    // barrel
    ctx.strokeStyle = "#cccccc";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(baseX, baseY);
    ctx.lineTo(tipX, tipY);
    ctx.stroke();
    // muzzle tip
    ctx.fillStyle = "#222";
    ctx.beginPath();
    ctx.arc(tipX, tipY, 3, 0, Math.PI * 2);
    ctx.fill();
    // turret head
    ctx.fillStyle = "#222";
    ctx.beginPath();
    ctx.arc(baseX, baseY, 6, 0, Math.PI * 2);
    ctx.fill();
    // muzzle flash on fresh recoil
    if (recoilFrac > 0.6) {
      ctx.fillStyle = "#ffeebb";
      ctx.beginPath();
      ctx.arc(tipX, tipY, 5, 0, Math.PI * 2);
      ctx.fill();
    }
    // ammo dots (orange)
    ctx.fillStyle = "#ff8800";
    for (let i = 0; i < b.ammo; i++) ctx.fillRect(px + 2 + i*5, py + 2, 4, 4);
  } else if (b.type === BTYPE.HEAVY_TURRET) {
    ctx.fillStyle = "#3a3a3a";
    ctx.fillRect(px, py, TILE, TILE);
    // outer plating
    ctx.strokeStyle = "#222";
    ctx.lineWidth = 2;
    ctx.strokeRect(px + 1, py + 1, TILE - 2, TILE - 2);
    const cx = px + TILE/2, cy = py + TILE/2;
    ctx.fillStyle = "#111";
    ctx.beginPath();
    ctx.arc(cx, cy, 8, 0, Math.PI * 2);
    ctx.fill();
    // double barrel
    ctx.strokeStyle = "#ddd";
    ctx.lineWidth = 4;
    const ang = b.barrelAngle;
    const ox = -Math.sin(ang) * 2, oy = Math.cos(ang) * 2;
    ctx.beginPath();
    ctx.moveTo(cx + ox, cy + oy);
    ctx.lineTo(cx + ox + Math.cos(ang) * 12, cy + oy + Math.sin(ang) * 12);
    ctx.moveTo(cx - ox, cy - oy);
    ctx.lineTo(cx - ox + Math.cos(ang) * 12, cy - oy + Math.sin(ang) * 12);
    ctx.stroke();
    // ammo dots (orange)
    ctx.fillStyle = "#ff8800";
    const dots = Math.min(5, Math.ceil(b.ammo / 10));
    for (let i = 0; i < dots; i++) ctx.fillRect(px + 2 + i*4, py + 2, 3, 3);
  } else if (b.type === BTYPE.RAIL) {
    drawRailTile(b, px, py);
  } else if (b.type === BTYPE.STATION) {
    // Only draw the full station ONCE (when this is the anchor cell).
    if (b.x === px / TILE && b.y === py / TILE) {
      const cells = b.cells || [{ x: b.x, y: b.y }];
      // Determine bounding box
      let xMinT = Infinity, yMinT = Infinity, xMaxT = -Infinity, yMaxT = -Infinity;
      for (const c of cells) {
        if (c.x < xMinT) xMinT = c.x;
        if (c.y < yMinT) yMinT = c.y;
        if (c.x > xMaxT) xMaxT = c.x;
        if (c.y > yMaxT) yMaxT = c.y;
      }
      const sx = xMinT * TILE, sy = yMinT * TILE;
      const sw = (xMaxT - xMinT + 1) * TILE, sh = (yMaxT - yMinT + 1) * TILE;
      ctx.fillStyle = "#3b3026";
      ctx.fillRect(sx, sy, sw, sh);
      // Two parallel rails along the long axis
      const horizontal = sw > sh;
      ctx.strokeStyle = "#cccccc";
      ctx.lineWidth = 2;
      if (horizontal) {
        ctx.beginPath();
        ctx.moveTo(sx, sy + 7); ctx.lineTo(sx + sw, sy + 7);
        ctx.moveTo(sx, sy + sh - 7); ctx.lineTo(sx + sw, sy + sh - 7);
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.moveTo(sx + 7, sy); ctx.lineTo(sx + 7, sy + sh);
        ctx.moveTo(sx + sw - 7, sy); ctx.lineTo(sx + sw - 7, sy + sh);
        ctx.stroke();
      }
      // Roof outline
      ctx.strokeStyle = "#ffd700"; ctx.lineWidth = 2;
      ctx.strokeRect(sx + 1, sy + 1, sw - 2, sh - 2);
      // Name above
      ctx.fillStyle = "#fff";
      ctx.font = "bold 11px ui-monospace, Consolas, monospace";
      ctx.textBaseline = "bottom";
      ctx.lineWidth = 3; ctx.strokeStyle = "#000";
      ctx.strokeText(b.name || "Station", sx + 4, sy - 2);
      ctx.fillText(b.name || "Station", sx + 4, sy - 2);
      ctx.textBaseline = "top";
    }
  } else if (b.type === BTYPE.SPLITTER) {
    ctx.fillStyle = "#3a5a7a";
    ctx.fillRect(px, py, TILE, TILE);
    ctx.strokeStyle = "#88ccff";
    ctx.lineWidth = 2;
    const cx = px + TILE/2, cy = py + TILE/2;
    // Y-shape: arrows to all 4 sides faintly, item dot in center
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(px + 4, py + 4);
    ctx.moveTo(cx, cy);
    ctx.lineTo(px + TILE - 4, py + 4);
    ctx.moveTo(cx, cy);
    ctx.lineTo(px + 4, py + TILE - 4);
    ctx.moveTo(cx, cy);
    ctx.lineTo(px + TILE - 4, py + TILE - 4);
    ctx.stroke();
    if (b.item != null) drawItem(cx, cy, b.item);
  } else if (b.type === BTYPE.UNDERGROUND_BELT) {
    const r = undergroundRole(b);
    ctx.fillStyle = "#2a2a2a";
    ctx.fillRect(px, py, TILE, TILE);
    // tunnel mouth (small dark circle on the entering/exiting end)
    ctx.fillStyle = "#000";
    const cx = px + TILE/2, cy = py + TILE/2;
    let holeX = cx, holeY = cy;
    if (r.role === "entry") { holeX = cx + DX[b.dir]*7; holeY = cy + DY[b.dir]*7; }
    else if (r.role === "exit") { holeX = cx - DX[b.dir]*7; holeY = cy - DY[b.dir]*7; }
    ctx.beginPath();
    ctx.arc(holeX, holeY, 5, 0, Math.PI * 2);
    ctx.fill();
    // arrow showing direction; tinted by role
    let arrowColor = "#888";
    if (r.role === "entry") arrowColor = "#ffd700";
    else if (r.role === "exit") arrowColor = "#7fff7f";
    ctx.fillStyle = arrowColor;
    drawArrow(cx - DX[b.dir]*3, cy - DY[b.dir]*3, b.dir, 5);
    if (b.item != null) drawItem(cx, cy, b.item);
  } else if (b.type === BTYPE.WALL) {
    ctx.fillStyle = COL.wall;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.strokeStyle = "#555";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(px, py + 8); ctx.lineTo(px + TILE, py + 8);
    ctx.moveTo(px, py + 16); ctx.lineTo(px + TILE, py + 16);
    ctx.stroke();
    // hp bar
    if (b.hp < WALL_HP) {
      ctx.fillStyle = "#400"; ctx.fillRect(px+2, py+TILE-4, TILE-4, 2);
      ctx.fillStyle = "#0c0"; ctx.fillRect(px+2, py+TILE-4, (TILE-4) * (b.hp / WALL_HP), 2);
    }
  }
}

function drawArrow(cx, cy, dir, size) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(DIR_RAD[dir]);
  ctx.beginPath();
  ctx.moveTo(size, 0);
  ctx.lineTo(-size*0.6, -size*0.7);
  ctx.lineTo(-size*0.6, size*0.7);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawItem(x, y, type) {
  if (type === ITEM.SHELL) {
    // Pointed brass cartridge.
    ctx.fillStyle = "#b8893a";
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#3a2a10";
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = "#3a2a10";
    ctx.fillRect(x - 1, y - 3, 2, 2);
    return;
  }
  if (type === ITEM.HEAVY_AMMO) {
    ctx.fillStyle = "#ff8800";
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#552200";
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = "#ffd700";
    ctx.fillRect(x - 1, y - 1, 2, 2);
    return;
  }
  ctx.fillStyle = type === ITEM.ORE ? COL.ore : COL.ammo;
  ctx.beginPath();
  ctx.arc(x, y, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = "rgba(0,0,0,0.5)";
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawPlayer() {
  drawShadow(player.x - 10, player.y - 10, 20, 20);
  ctx.fillStyle = COL.player;
  ctx.beginPath();
  ctx.arc(player.x, player.y, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = COL.playerOutline;
  ctx.lineWidth = 2;
  ctx.stroke();
  // facing triangle
  ctx.fillStyle = COL.playerOutline;
  drawArrow(player.x + DX[player.facing]*8, player.y + DY[player.facing]*8, player.facing, 4);
}

function drawZombies() {
  // Cull zombies outside the camera viewport (with a small margin) — most of a 1k+ horde
  // is off-screen at any given time and was being drawn for nothing.
  const cullX0 = camX - TILE * 2, cullY0 = camY - TILE * 2;
  const cullX1 = camX + VIEW_W + TILE * 2, cullY1 = camY + VIEW_H + TILE * 2;
  for (const z of zombies) {
    if (z.x < cullX0 || z.x > cullX1 || z.y < cullY0 || z.y > cullY1) continue;
    const alpha = z.dead ? Math.max(0, z.fade / 400) : 1;
    ctx.globalAlpha = alpha;
    drawShadow(z.x - 9, z.y - 9, 18, 18);
    ctx.fillStyle = z.isBoss ? "#a83838" : COL.zombie;
    const bobY = z.dead ? 0 : Math.sin(z.bob) * 1.5;
    ctx.beginPath();
    ctx.arc(z.x, z.y + bobY, 9, 0, Math.PI * 2);
    ctx.fill();
    if (z.isBoss && !z.dead) {
      ctx.strokeStyle = "#ff7777";
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
    ctx.fillStyle = COL.zombieEye;
    ctx.fillRect(z.x - 4, z.y - 2 + bobY, 2, 2);
    ctx.fillRect(z.x + 2, z.y - 2 + bobY, 2, 2);
    // hp
    if (!z.dead && z.hp < ZOMBIE_HP) {
      ctx.fillStyle = "#400"; ctx.fillRect(z.x-9, z.y-14, 18, 2);
      ctx.fillStyle = "#0c0"; ctx.fillRect(z.x-9, z.y-14, 18 * (z.hp/ZOMBIE_HP), 2);
    }
    ctx.globalAlpha = 1;
  }
}

function drawShells() {
  // In-flight shells — bright projectile with a glowing tracer tail so they're easy to track.
  const cullX0 = camX - TILE * 4, cullY0 = camY - TILE * 4;
  const cullX1 = camX + VIEW_W + TILE * 4, cullY1 = camY + VIEW_H + TILE * 4;
  for (const s of shells) {
    if (s.x < cullX0 || s.x > cullX1 || s.y < cullY0 || s.y > cullY1) continue;
    // Long faint outer trail
    ctx.strokeStyle = "rgba(255,160,40,0.45)";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(s.x - s.vx * 60, s.y - s.vy * 60);
    ctx.lineTo(s.x, s.y);
    ctx.stroke();
    // Bright inner trail
    ctx.strokeStyle = "rgba(255,235,140,0.95)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(s.x - s.vx * 30, s.y - s.vy * 30);
    ctx.lineTo(s.x, s.y);
    ctx.stroke();
    // Projectile body
    ctx.fillStyle = "#1a1a1a";
    ctx.beginPath();
    ctx.arc(s.x, s.y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(s.x, s.y, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawExplosions() {
  for (const e of explosions) {
    const t = 1 - e.life / e.maxLife; // 0 → 1 over life
    const r = e.radius * (0.4 + 0.6 * t);
    const alpha = 1 - t;
    ctx.globalAlpha = alpha;
    // outer fireball
    ctx.fillStyle = "#ff7a1f";
    ctx.beginPath(); ctx.arc(e.x, e.y, r, 0, Math.PI * 2); ctx.fill();
    // inner core
    ctx.fillStyle = "#ffe080";
    ctx.beginPath(); ctx.arc(e.x, e.y, r * 0.55, 0, Math.PI * 2); ctx.fill();
    // dark smoke ring
    ctx.strokeStyle = "rgba(40,20,10,0.5)";
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(e.x, e.y, r * 1.05, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

function drawPlayerBullets() {
  const cullX0 = camX - TILE * 2, cullY0 = camY - TILE * 2;
  const cullX1 = camX + VIEW_W + TILE * 2, cullY1 = camY + VIEW_H + TILE * 2;
  ctx.lineCap = "round";
  for (const b of playerBullets) {
    if (b.x < cullX0 || b.x > cullX1 || b.y < cullY0 || b.y > cullY1) continue;
    // Yellow tracer line drawn opposite to velocity (so the bullet's "head" leads).
    const speed = Math.hypot(b.vx, b.vy) || 1;
    const tailLen = TILE * 0.6;
    const tailX = b.x - (b.vx / speed) * tailLen;
    const tailY = b.y - (b.vy / speed) * tailLen;
    ctx.strokeStyle = "rgba(255, 215, 60, 0.6)";
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(tailX, tailY);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
    ctx.fillStyle = "#fff7a8";
    ctx.beginPath();
    ctx.arc(b.x, b.y, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.lineCap = "butt";
}

function drawBullets() {
  ctx.strokeStyle = COL.bullet;
  ctx.lineWidth = 2;
  for (const b of bullets) {
    const a = b.life / 80;
    ctx.globalAlpha = a;
    ctx.beginPath();
    ctx.moveTo(b.x1, b.y1);
    ctx.lineTo(b.x2, b.y2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawPlacementPreview() {
  // Rail tool has its own preview elsewhere.
  if (selectedBuilding === BTYPE.RAIL) return;
  if (!inBounds(mouseTileX, mouseTileY)) return;
  const cells = footprintCells(selectedBuilding, mouseTileX, mouseTileY, placementDir);
  // Validity: every cell in-bounds and unoccupied; for miners the anchor must have ore;
  // for stations max 2 cap.
  let valid = true;
  for (const c of cells) {
    if (!inBounds(c.x, c.y)) { valid = false; break; }
    if (buildingAt(c.x, c.y)) { valid = false; break; }
  }
  if (selectedBuilding === BTYPE.MINER && oreAt(mouseTileX, mouseTileY) <= 0) valid = false;
  if (selectedBuilding === BTYPE.STATION && stations.length >= MAX_STATIONS) valid = false;
  // Ghost render of the building (for 1×1 only).
  if (cells.length === 1) {
    ctx.globalAlpha = 0.5;
    const fake = { type: selectedBuilding, x: mouseTileX, y: mouseTileY, dir: placementDir,
                   item: null, itemProgress: 0, ammo: 0, hp: WALL_HP, barrelAngle: DIR_RAD[placementDir],
                   cells };
    drawBuilding(fake);
    ctx.globalAlpha = 1;
  } else {
    // Multi-tile (e.g. station): tinted fill across all footprint cells
    ctx.fillStyle = valid ? "rgba(127,255,127,0.18)" : "rgba(255,85,85,0.22)";
    for (const c of cells) ctx.fillRect(c.x * TILE, c.y * TILE, TILE, TILE);
  }
  // Outline rect across the full bounding box of the footprint.
  let xMinT = Infinity, yMinT = Infinity, xMaxT = -Infinity, yMaxT = -Infinity;
  for (const c of cells) {
    if (c.x < xMinT) xMinT = c.x;
    if (c.y < yMinT) yMinT = c.y;
    if (c.x > xMaxT) xMaxT = c.x;
    if (c.y > yMaxT) yMaxT = c.y;
  }
  ctx.strokeStyle = valid ? "#7fff7f" : "#ff5555";
  ctx.lineWidth = 2;
  ctx.strokeRect(xMinT * TILE, yMinT * TILE, (xMaxT - xMinT + 1) * TILE, (yMaxT - yMinT + 1) * TILE);
}

function drawText(text, x, y, size, color) {
  ctx.font = size + "px ui-monospace, Consolas, monospace";
  ctx.textBaseline = "top";
  ctx.lineWidth = 3;
  ctx.strokeStyle = "#000";
  ctx.strokeText(text, x, y);
  ctx.fillStyle = color || "#fff";
  ctx.fillText(text, x, y);
}

function drawHotbarIcon(type, x, y, size) {
  const px = x, py = y;
  const fake = { type, x: 0, y: 0, dir: DIR.RIGHT, item: null, itemProgress: 0, ammo: 0, hp: WALL_HP, barrelAngle: 0 };
  ctx.save();
  ctx.translate(px - 0, py - 0);
  ctx.scale(size/TILE, size/TILE);
  // shift to origin
  ctx.translate(0, 0);
  // We'll draw at tile (0,0)
  ctx.restore();
  // Simpler: draw colored rect with letter
  const colorMap = { [BTYPE.MINER]: COL.miner, [BTYPE.BELT]: COL.belt, [BTYPE.ASSEMBLER]: COL.assembler, [BTYPE.TURRET]: COL.turret, [BTYPE.WALL]: COL.wall, [BTYPE.SPLITTER]: "#3a5a7a", [BTYPE.HEAVY_TURRET]: "#3a3a3a", [BTYPE.UNDERGROUND_BELT]: "#2a2a2a", [BTYPE.SNIPER_TURRET]: "#444", [BTYPE.RAIL]: "#3b3026", [BTYPE.STATION]: "#5a4a36", [BTYPE.ARTILLERY]: "#3a4632", [BTYPE.HEAVY_ASSEMBLER]: "#7a3a18", [BTYPE.BIG_DRILL]: "#6a4a26" };
  ctx.fillStyle = colorMap[type];
  ctx.fillRect(px, py, size, size);
  const labels = { [BTYPE.MINER]: "M", [BTYPE.BELT]: "B", [BTYPE.ASSEMBLER]: "A", [BTYPE.TURRET]: "T", [BTYPE.WALL]: "W", [BTYPE.SPLITTER]: "S", [BTYPE.HEAVY_TURRET]: "H", [BTYPE.UNDERGROUND_BELT]: "U", [BTYPE.SNIPER_TURRET]: "Sn", [BTYPE.RAIL]: "R", [BTYPE.STATION]: "St", [BTYPE.ARTILLERY]: "Ar", [BTYPE.HEAVY_ASSEMBLER]: "HA", [BTYPE.BIG_DRILL]: "BD" };
  drawText(labels[type], px + size/2 - 5, py + size/2 - 8, 16, "#fff");
}

function drawMapView(mx, my, mw, mh, opts) {
  opts = opts || {};
  const oreSource = opts.oreGrid || null; // 2D grid of ore counts; if null, use tiles
  const showEntities = opts.showEntities !== false;
  // sx/sy convert WORLD PIXELS -> map pixels
  // Active region (in tile coords) the map represents. For the world preview we render the buffer-shaped
  // grid but limit visible cells to the initial active region.
  const aXMin = (opts.bounds && opts.bounds.xMin) != null ? opts.bounds.xMin : xMin;
  const aYMin = (opts.bounds && opts.bounds.yMin) != null ? opts.bounds.yMin : yMin;
  const aXMax = (opts.bounds && opts.bounds.xMax) != null ? opts.bounds.xMax : xMax;
  const aYMax = (opts.bounds && opts.bounds.yMax) != null ? opts.bounds.yMax : yMax;
  const aW = (aXMax - aXMin) * TILE;
  const aH = (aYMax - aYMin) * TILE;
  const sx = mw / aW;
  const sy = mh / aH;
  const tileW = TILE * sx;
  const tileH = TILE * sy;
  // background
  ctx.fillStyle = "rgba(0,0,0,0.85)";
  ctx.fillRect(mx - 2, my - 2, mw + 4, mh + 4);
  ctx.fillStyle = "#1c2419";
  ctx.fillRect(mx, my, mw, mh);
  // Clip everything else to the map area so pan/zoom can show partial tiles cleanly.
  ctx.save();
  ctx.beginPath();
  ctx.rect(mx, my, mw, mh);
  ctx.clip();
  // Iterate integer tile cells visible within the (possibly fractional) bounds.
  const tx0 = Math.max(0, Math.floor(aXMin));
  const ty0 = Math.max(0, Math.floor(aYMin));
  const tx1 = Math.min(WORLD_MAX_COLS, Math.ceil(aXMax));
  const ty1 = Math.min(WORLD_MAX_ROWS, Math.ceil(aYMax));
  // ore — bright so it pops on the map
  ctx.fillStyle = "#c8d8ec";
  for (let y = ty0; y < ty1; y++) {
    for (let x = tx0; x < tx1; x++) {
      const v = oreSource ? oreSource[y * WORLD_MAX_COLS + x] : oreAt(x, y);
      if (v > 0) {
        ctx.fillRect(mx + (x - aXMin)*tileW, my + (y - aYMin)*tileH, Math.max(1.5, tileW), Math.max(1.5, tileH));
      }
    }
  }
  if (!showEntities) {
    ctx.restore();
    ctx.strokeStyle = "#555";
    ctx.strokeRect(mx, my, mw, mh);
    return;
  }
  // buildings
  const bcol = {
    [BTYPE.MINER]: "#d4a96a",
    [BTYPE.BELT]: "#aaa",
    [BTYPE.ASSEMBLER]: "#d27a4a",
    [BTYPE.TURRET]: "#ffffff",
    [BTYPE.WALL]: "#c0c0c0",
    [BTYPE.SPLITTER]: "#88ccff",
    [BTYPE.HEAVY_TURRET]: "#ffffff",
    [BTYPE.UNDERGROUND_BELT]: "#666",
    [BTYPE.SNIPER_TURRET]: "#cccccc",
    [BTYPE.RAIL]: "#7a7a7a",
    [BTYPE.STATION]: "#d4a96a",
    [BTYPE.ARTILLERY]: "#5a7a3a",
    [BTYPE.HEAVY_ASSEMBLER]: "#a85a28",
    [BTYPE.BIG_DRILL]: "#d8a060",
  };
  const bSeen = new Set();
  for (const b of buildings.values()) {
    if (bSeen.has(b)) continue;
    bSeen.add(b);
    // Get this building's full bounding box (multi-tile buildings render at full size).
    const cells = b.cells || [{ x: b.x, y: b.y }];
    let bxMin = Infinity, byMin = Infinity, bxMax = -Infinity, byMax = -Infinity;
    for (const c of cells) {
      if (c.x < bxMin) bxMin = c.x;
      if (c.y < byMin) byMin = c.y;
      if (c.x > bxMax) bxMax = c.x;
      if (c.y > byMax) byMax = c.y;
    }
    if (bxMax < tx0 - 1 || bxMin > tx1 || byMax < ty0 - 1 || byMin > ty1) continue;
    ctx.fillStyle = bcol[b.type] || "#fff";
    const bw = (bxMax - bxMin + 1) * tileW;
    const bh = (byMax - byMin + 1) * tileH;
    ctx.fillRect(mx + (bxMin - aXMin) * tileW, my + (byMin - aYMin) * tileH,
                 Math.max(1.5, bw), Math.max(1.5, bh));
  }
  // Depleted-miner markers: pulsing red dot on any miner whose ore tile is exhausted.
  // Same pulse cadence as the in-world badge on miners.
  const minerPulse = 0.6 + 0.4 * Math.sin(performance.now() / 200);
  ctx.globalAlpha = minerPulse;
  ctx.fillStyle = "#ff4040";
  for (const b of bSeen) {
    let isDepleted = false;
    let cx = 0, cy = 0;
    if (b.type === BTYPE.MINER) {
      if (oreAt(b.x, b.y) > 0) continue;
      isDepleted = true;
      cx = b.x + 0.5;
      cy = b.y + 0.5;
    } else if (b.type === BTYPE.BIG_DRILL) {
      if (!bigDrillDepleted(b)) continue;
      isDepleted = true;
      cx = b.x + 1.5;
      cy = b.y + 1.5;
    } else {
      continue;
    }
    if (!isDepleted) continue;
    if (b.x + 2 < tx0 - 1 || b.x > tx1 || b.y + 2 < ty0 - 1 || b.y > ty1) continue;
    const dxp = mx + (cx - aXMin) * tileW;
    const dyp = my + (cy - aYMin) * tileH;
    const r = b.type === BTYPE.BIG_DRILL ? Math.max(8, tileW * 2.5) : Math.max(5, tileW * 1.4);
    ctx.beginPath();
    ctx.arc(dxp, dyp, r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Turret range circles — only on the full map (where labels are on) so the minimap stays clean.
  if (opts.showLabels) {
    for (const b of bSeen) {
      let range = 0, minRange = 0, color = null;
      let bcx = b.x, bcy = b.y; // tile-coord center of turret
      if (b.type === BTYPE.TURRET)         { range = TURRET_RANGE;        color = "rgba(255, 215,  60, 0.10)"; }
      else if (b.type === BTYPE.HEAVY_TURRET) { range = TURRET_RANGE;        color = "rgba(255, 130,   0, 0.10)"; }
      else if (b.type === BTYPE.SNIPER_TURRET){ range = SNIPER_TURRET_RANGE; color = "rgba(120, 220, 255, 0.08)"; }
      else if (b.type === BTYPE.ARTILLERY)  {
        range = ARTILLERY_RANGE; minRange = ARTILLERY_MIN_RANGE;
        color = "rgba(255,  90,  60, 0.07)";
        bcx = b.x + 1.5; bcy = b.y + 1.5; // 3x3 center
      } else continue;
      if (range <= 0) continue;
      const rcx = mx + (bcx + 0.5 - aXMin) * tileW;
      const rcy = my + (bcy + 0.5 - aYMin) * tileH;
      // Convert pixel range to map pixels.
      const rPx = range * sx;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(rcx, rcy, rPx, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = color.replace(/0\.\d+\)/, "0.45)");
      ctx.lineWidth = 1;
      ctx.stroke();
      if (minRange > 0) {
        // Inner "dead zone" cutout — translucent darker circle.
        const minPx = minRange * sx;
        ctx.fillStyle = "rgba(0, 0, 0, 0.18)";
        ctx.beginPath();
        ctx.arc(rcx, rcy, minPx, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(255, 90, 60, 0.45)";
        ctx.beginPath();
        ctx.arc(rcx, rcy, minPx, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
  }

  // Station outlines (and names if labels are on) — draw on top of the per-tile fill so they
  // read clearly at any zoom.
  for (const s of stations) {
    const sc = s.cells || [{ x: s.x, y: s.y }];
    let sxMinT = Infinity, syMinT = Infinity, sxMaxT = -Infinity, syMaxT = -Infinity;
    for (const c of sc) {
      if (c.x < sxMinT) sxMinT = c.x;
      if (c.y < syMinT) syMinT = c.y;
      if (c.x > sxMaxT) sxMaxT = c.x;
      if (c.y > syMaxT) syMaxT = c.y;
    }
    const ox = mx + (sxMinT - aXMin) * tileW;
    const oy = my + (syMinT - aYMin) * tileH;
    const ow = (sxMaxT - sxMinT + 1) * tileW;
    const oh = (syMaxT - syMinT + 1) * tileH;
    ctx.fillStyle = "#d4a96a";
    ctx.fillRect(ox, oy, Math.max(2, ow), Math.max(2, oh));
    ctx.strokeStyle = "#ffd700";
    ctx.lineWidth = 1.5;
    ctx.strokeRect(ox, oy, Math.max(2, ow), Math.max(2, oh));
    if (opts.showLabels && s.name) {
      ctx.font = "bold 11px ui-monospace, Consolas, monospace";
      ctx.textBaseline = "bottom";
      ctx.lineWidth = 3;
      ctx.strokeStyle = "#000";
      ctx.strokeText(s.name, ox, oy - 2);
      ctx.fillStyle = "#ffd700";
      ctx.fillText(s.name, ox, oy - 2);
      ctx.textBaseline = "top";
    }
  }
  // zombies
  ctx.fillStyle = "#ff4444";
  for (const z of zombies) {
    if (z.dead) continue;
    ctx.fillRect(mx + (z.x - aXMin*TILE)*sx - 1.5, my + (z.y - aYMin*TILE)*sy - 1.5, 3, 3);
  }
  // player
  ctx.fillStyle = COL.player;
  ctx.fillRect(mx + (player.x - aXMin*TILE)*sx - 2.5, my + (player.y - aYMin*TILE)*sy - 2.5, 5, 5);
  // train marker
  if (train) {
    let trainPos = null;
    if (train.pathCells && train.pathCells.length >= 2) {
      trainPos = pathPositionAt(train.pathCells, train.pathProgress);
    } else if (train.parkedStationIndex != null && stations[train.parkedStationIndex]) {
      const s = stations[train.parkedStationIndex];
      trainPos = { x: s.x * TILE + TILE/2, y: s.y * TILE + TILE/2 };
    }
    if (trainPos) {
      const tmx = mx + (trainPos.x - aXMin*TILE) * sx;
      const tmy = my + (trainPos.y - aYMin*TILE) * sy;
      // Locomotive dot + storage dot for clarity
      ctx.fillStyle = "#a87a44";
      ctx.beginPath(); ctx.arc(tmx, tmy, 4, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "#000"; ctx.lineWidth = 1; ctx.stroke();
    }
  }
  // shells in flight — bright orange dot with a high-contrast tracer that's visible at any zoom.
  for (const sh of shells) {
    const sx2 = mx + (sh.x - aXMin*TILE) * sx;
    const sy2 = my + (sh.y - aYMin*TILE) * sy;
    // Trail length is independent of scale so it's still visible on the minimap.
    const dx = sh.vx, dy = sh.vy;
    const len = Math.hypot(dx, dy) || 1;
    const trailLen = Math.max(20, 60 * sx); // at least 20 px regardless of scale
    const tdx = dx / len * trailLen;
    const tdy = dy / len * trailLen;
    ctx.strokeStyle = "rgba(255,140,40,0.85)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sx2 - tdx, sy2 - tdy);
    ctx.lineTo(sx2, sy2);
    ctx.stroke();
    ctx.fillStyle = "#ffe080";
    ctx.beginPath(); ctx.arc(sx2, sy2, 4, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  // explosions — bright fireball, minimum 8 px on the map so they're always visible.
  for (const e of explosions) {
    const t = 1 - e.life / e.maxLife;
    const r = Math.max(8, e.radius * (0.4 + 0.6 * t) * sx);
    const alpha = 1 - t * 0.6; // fade slower so they linger visually
    const ex2 = mx + (e.x - aXMin*TILE) * sx;
    const ey2 = my + (e.y - aYMin*TILE) * sy;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = "#ff7a1f";
    ctx.beginPath(); ctx.arc(ex2, ey2, r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#ffe080";
    ctx.beginPath(); ctx.arc(ex2, ey2, r * 0.55, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.4)";
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(ex2, ey2, r, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1;
  }
  // viewport rectangle
  ctx.strokeStyle = COL.selected;
  ctx.lineWidth = 1;
  ctx.strokeRect(mx + (camX - aXMin*TILE)*sx, my + (camY - aYMin*TILE)*sy, VIEW_W*sx, VIEW_H*sy);
  ctx.restore();
  // border
  ctx.strokeStyle = "#555";
  ctx.strokeRect(mx, my, mw, mh);
}

// Capture all unique buildings whose anchor cell is inside the [x0..x1, y0..y1] rect.
function buildBlueprintFromRect(x0, y0, x1, y1, name) {
  const xLo = Math.min(x0, x1), xHi = Math.max(x0, x1);
  const yLo = Math.min(y0, y1), yHi = Math.max(y0, y1);
  const items = [];
  const seen = new Set();
  for (let y = yLo; y <= yHi; y++) {
    for (let x = xLo; x <= xHi; x++) {
      const b = buildingAt(x, y);
      if (!b || seen.has(b)) continue;
      // Only count buildings whose anchor is in the rect (avoid duplicating multi-tiles).
      if (b.x < xLo || b.x > xHi || b.y < yLo || b.y > yHi) continue;
      seen.add(b);
      items.push({ t: b.type, dx: b.x - xLo, dy: b.y - yLo, dir: b.dir });
    }
  }
  return { name, items };
}

// Returns true if all blueprint items fit in-bounds at the given anchor.
function blueprintCanPlaceAt(bp, ax, ay) {
  for (const it of bp.items) {
    const cells = footprintCells(it.t, ax + it.dx, ay + it.dy, it.dir);
    for (const c of cells) {
      if (!inBounds(c.x, c.y)) return false;
      if (buildingAt(c.x, c.y)) return false;
    }
  }
  return true;
}

function placeBlueprintAt(bp, ax, ay) {
  let placed = 0;
  for (const it of bp.items) {
    if (placeBuilding(it.t, ax + it.dx, ay + it.dy, it.dir)) placed++;
  }
  return placed;
}

function canSkipToNextWave() {
  if (gameOver || paused) return false;
  if (waveState.spawning) return false;
  if (waveState.waveNumber > 0 && liveZombieCount() > 0) return false;
  return true;
}

hudSkipBtn.addEventListener("click", () => {
  if (!canSkipToNextWave()) return;
  waveState.nextWaveAt = 0; // tickWaves will pick this up next frame
});

function updateHUD() {
  // Mark upcoming or active boss waves (every 10th).
  const upcomingBoss = ((waveState.waveNumber + 1) % 10 === 0);
  hudWaveNum.textContent = waveState.bossWave
    ? `${waveState.waveNumber} BOSS`
    : (upcomingBoss && !waveState.spawning && (waveState.waveNumber === 0 || liveZombieCount() === 0))
      ? `${waveState.waveNumber} (next: BOSS)`
      : waveState.waveNumber;
  const nextSec = Math.max(0, Math.ceil((waveState.spawning ? 0 : waveState.nextWaveAt) / 1000));
  const live = liveZombieCount();
  if (waveState.spawning) {
    hudWaveSub.textContent = `Spawning ${waveState.spawned}/${waveState.spawnCount}`;
  } else if (waveState.waveNumber > 0 && live > 0) {
    hudWaveSub.textContent = `Defeat ${live} zombies`;
  } else {
    hudWaveSub.textContent = `Next in ${nextSec}s`;
  }
  const hpPct = Math.max(0, player.hp) / PLAYER_MAX_HP * 100;
  hudHpFill.style.width = hpPct + "%";
  hudHpLabel.textContent = `HP ${Math.max(0, Math.floor(player.hp))}/${PLAYER_MAX_HP}`;
  hudSkipBtn.disabled = !canSkipToNextWave();
  if (train) {
    hudTrain.style.display = "block";
    let where = "—";
    if (train.status === "parked" && train.parkedStationIndex != null && stations[train.parkedStationIndex])
      where = "parked at " + stations[train.parkedStationIndex].name;
    else if (train.status === "moving") where = "in transit";
    hudTrain.textContent = `Train: ${where} — ${train.inventory}/${TRAIN_INVENTORY_MAX}`;
  } else {
    hudTrain.style.display = "none";
  }
  hudSkipBtn.textContent = waveState.spawning
    ? "Spawning..."
    : (waveState.waveNumber > 0 && live > 0)
      ? "Clear zombies first"
      : `Start wave ${waveState.waveNumber + 1}`;
}

function drawUI() {
  updateHUD();

  // hotbar
  const slotSize = 48;
  const slots = 14;
  const totalW = slots * slotSize + (slots-1) * 6;
  const startX = (VIEW_W - totalW) / 2;
  const y = VIEW_H - slotSize - 80;
  for (let i = 0; i < slots; i++) {
    const type = i + 1;
    const x = startX + i * (slotSize + 6);
    const locked = (type === BTYPE.HEAVY_TURRET && waveState.waveNumber < HEAVY_TURRET_UNLOCK_WAVE)
                || (type === BTYPE.SNIPER_TURRET && waveState.waveNumber < SNIPER_TURRET_UNLOCK_WAVE)
                || ((type === BTYPE.RAIL || type === BTYPE.STATION) && waveState.waveNumber < RAIL_UNLOCK_WAVE)
                || (type === BTYPE.ARTILLERY && waveState.waveNumber < ARTILLERY_UNLOCK_WAVE)
                || (type === BTYPE.HEAVY_ASSEMBLER && waveState.waveNumber < ARTILLERY_UNLOCK_WAVE)
                || (type === BTYPE.BIG_DRILL && waveState.waveNumber < BIG_DRILL_UNLOCK_WAVE);
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(x, y, slotSize, slotSize);
    drawHotbarIcon(type, x + 8, y + 8, slotSize - 16);
    if (locked) {
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(x, y, slotSize, slotSize);
      let wv = HEAVY_TURRET_UNLOCK_WAVE;
      if (type === BTYPE.SNIPER_TURRET) wv = SNIPER_TURRET_UNLOCK_WAVE;
      else if (type === BTYPE.RAIL || type === BTYPE.STATION) wv = RAIL_UNLOCK_WAVE;
      else if (type === BTYPE.ARTILLERY || type === BTYPE.HEAVY_ASSEMBLER) wv = ARTILLERY_UNLOCK_WAVE;
      else if (type === BTYPE.BIG_DRILL) wv = BIG_DRILL_UNLOCK_WAVE;
      drawText("W" + wv, x + 8, y + slotSize/2 - 6, 12, "#ff7777");
    }
    if (selectedBuilding === type) {
      ctx.strokeStyle = COL.selected;
      ctx.lineWidth = 3;
      ctx.strokeRect(x, y, slotSize, slotSize);
    } else {
      ctx.strokeStyle = locked ? "#552222" : "#333";
      ctx.lineWidth = 1;
      ctx.strokeRect(x, y, slotSize, slotSize);
    }
    const keyLabel = type === BTYPE.RAIL ? "0" : type === BTYPE.STATION ? "-" : type === BTYPE.ARTILLERY ? "=" : type === BTYPE.HEAVY_ASSEMBLER ? "[" : type === BTYPE.BIG_DRILL ? "]" : String(type);
    drawText(keyLabel, x + 4, y + 2, 12, "#ffd700");
  }

  // bottom-right counters
  drawText(`Ore mined:     ${stats.oreMined}`, VIEW_W - 240, VIEW_H - 60, 12);
  drawText(`Ammo produced: ${stats.ammoProduced}`, VIEW_W - 240, VIEW_H - 44, 12);
  drawText(`Heavy ammo:    ${stats.heavyAmmoProduced || 0}`, VIEW_W - 240, VIEW_H - 28, 12);

  // hint top-right
  drawText("WASD | 1-9 select | 0/- rail/station | LMB/RMB | R rot | F save | L load | M map | G world | Esc", VIEW_W - 820, 12, 12);

  // Minimap top-right (below the controls hint)
  const mmW = 240, mmH = Math.round(mmW * H / W);
  drawMapView(VIEW_W - mmW - 12, 80, mmW, mmH);

  // Full map overlay
  if (showMap) {
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
    let bigW = VIEW_W - 200;
    let bigH = bigW * H / W;
    if (bigH > VIEW_H - 120) { bigH = VIEW_H - 120; bigW = bigH * W / H; }
    const mx = (VIEW_W - bigW) / 2, my = (VIEW_H - bigH) / 2;
    bigMapRect = { x: mx, y: my, w: bigW, h: bigH };
    drawMapView(mx, my, bigW, bigH, { bounds: computeFullMapBounds(), showLabels: true });
    drawText("Press M to close — drag to pan, scroll to zoom (" + mapView.zoom.toFixed(2) + "x)", VIEW_W/2 - 220, my - 22, 14, "#ffd700");
  } else {
    bigMapRect = null;
  }
  if (toastTimer > 0) {
    drawText(toastText, VIEW_W/2 - 60, 60, 16, "#ffd700");
  }

  if (paused && !gameOver) {
    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
    drawText("Paused — press Esc to resume", VIEW_W/2 - 160, VIEW_H/2 - 8, 16);
  }
  if (gameOver) {
    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  }

  if (worldGenOpen) {
    ctx.fillStyle = "rgba(0,0,0,0.85)";
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
    const bw = 900, bh = 640;
    const bx = (VIEW_W - bw) / 2, by = (VIEW_H - bh) / 2;
    ctx.fillStyle = "#161616";
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = COL.selected;
    ctx.lineWidth = 2;
    ctx.strokeRect(bx, by, bw, bh);
    drawText("Generate New World", bx + 24, by + 20, 16, "#ffd700");
    // Settings on left
    const sx0 = bx + 24, sy0 = by + 64;
    drawText(`Patch count       : ${worldGenSettings.count}    [-/+]`, sx0, sy0, 16);
    drawText(`Edge inset        : ${worldGenSettings.inset}    [ [ / ] ]`, sx0, sy0 + 28, 16);
    drawText(`Min gap between   : ${worldGenSettings.gap}    [ , / . ]`, sx0, sy0 + 56, 16);
    drawText(`Patches placed    : ${worldGenLastPlaced} / ${worldGenSettings.count}`, sx0, sy0 + 100, 12, "#bbb");
    drawText("[Space] Reroll preview", sx0, sy0 + 132, 12, "#bbb");
    drawText("[Enter] Generate world", sx0, sy0 + 152, 12, "#bbb");
    drawText("[Esc]   Cancel", sx0, sy0 + 172, 12, "#bbb");
    // Preview on right (always at initial-size aspect ratio)
    const initB = getInitialBounds();
    const initW = (initB.xMax - initB.xMin) * TILE;
    const initH = (initB.yMax - initB.yMin) * TILE;
    const pw = 520, ph = Math.round(pw * initH / initW);
    const px2 = bx + bw - pw - 24;
    const py2 = by + 64;
    drawText("Preview", px2, py2 - 22, 12, "#bbb");
    drawMapView(px2, py2, pw, ph, { oreGrid: worldGenPreview, showEntities: false, bounds: initB });
    // Player spawn marker (center of initial bounds)
    if (worldGenPreview) {
      ctx.fillStyle = COL.player;
      ctx.fillRect(px2 + pw/2 - 3, py2 + ph/2 - 3, 6, 6);
    }
    drawText("Player spawn (cream dot)", px2, py2 + ph + 8, 12, "#bbb");
  }

  if (pendingConfirm) {
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
    const bw = 460, bh = 160;
    const bx = (VIEW_W - bw) / 2, by = (VIEW_H - bh) / 2;
    ctx.fillStyle = "#1a1a1a";
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = COL.selected;
    ctx.lineWidth = 2;
    ctx.strokeRect(bx, by, bw, bh);
    let verb = "do this", detail = "";
    if (pendingConfirm === "save") { verb = "save"; detail = "This will overwrite any existing save."; }
    else if (pendingConfirm === "load") { verb = "load"; detail = "This will discard the current game."; }
    else if (pendingConfirm === "newworld") { verb = "generate this world"; detail = "All buildings, ore, and progress will be lost."; }
    drawText(`Are you sure you want to ${verb}?`, bx + 24, by + 24, 16);
    drawText(detail, bx + 24, by + 60, 12, "#bbb");
    drawText("[Y] Yes      [N] No", bx + 24, by + 110, 16, "#ffd700");
  }
}

// ============================================================
// Game Loop (fixed timestep accumulator)
// ============================================================
let lastTime = performance.now();
let accumulator = 0;

function update(dt) {
  if (toastTimer > 0) toastTimer -= dt;
  if (paused || gameOver) return;
  tickPlayer(dt);
  updateCamera();
  handleClicks();
  tickMiners(dt);
  tickBigDrills(dt);
  tickBelts(dt);
  tickUndergroundBelts(dt);
  tickSplitters(dt);
  tickAssemblers(dt);
  tickHeavyAssemblers(dt);
  // Rebuild the per-frame zombie spatial grid so all the targeting/AOE queries below are O(local).
  rebuildZombieGrid();
  // Order: artillery → sniper → heavy → normal. Earlier turrets reduce z.hp first, and the
  // others skip targets whose hp is already <= 0, so guns don't waste shots overlapping.
  tickArtillery(dt);
  tickShells(dt);
  tickSniperTurrets(dt);
  tickHeavyTurrets(dt);
  tickTurrets(dt);
  tickTrain(dt);
  tickStation(dt);
  tickPlayerBullets(dt);
  tickZombies(dt);
  tickWaves(dt, performance.now());
}

function render() {
  ctx.clearRect(0, 0, VIEW_W, VIEW_H);
  ctx.save();
  ctx.translate(-Math.round(camX), -Math.round(camY));
  drawGround();
  // Multi-tile buildings appear once per occupied cell in the map; dedupe.
  const seen = new Set();
  for (const b of buildings.values()) {
    if (seen.has(b)) continue;
    seen.add(b);
    drawBuilding(b);
  }
  drawTrain();
  drawBlueprintOverlay();
  drawBullets();
  drawPlayerBullets();
  drawShells();
  drawExplosions();
  drawZombies();
  drawPlayer();
  if (!gameOver && !paused) drawPlacementPreview();
  if (!gameOver && !paused) drawRailToolPreview();
  ctx.restore();
  drawUI();
}

// Returns world-pixel position at a continuous progress along a list of tile-coord cells.
// Progress 0 = first cell center, progress (cells.length - 1) = last cell center.
function pathPositionAt(cells, progress) {
  if (!cells || cells.length === 0) return { x: 0, y: 0 };
  if (cells.length === 1) return { x: cells[0].x * TILE + TILE/2, y: cells[0].y * TILE + TILE/2 };
  const clamped = Math.max(0, Math.min(cells.length - 1.0001, progress));
  const idx = Math.floor(clamped);
  const t = clamped - idx;
  const a = cells[idx], b = cells[idx + 1];
  return {
    x: (a.x + (b.x - a.x) * t) * TILE + TILE/2,
    y: (a.y + (b.y - a.y) * t) * TILE + TILE/2,
  };
}

function drawBlueprintOverlay() {
  if (blueprintCapture) {
    const sx = blueprintCapture.start ? blueprintCapture.start.x : mouseTileX;
    const sy = blueprintCapture.start ? blueprintCapture.start.y : mouseTileY;
    const ex = mouseTileX, ey = mouseTileY;
    const xLo = Math.min(sx, ex), xHi = Math.max(sx, ex);
    const yLo = Math.min(sy, ey), yHi = Math.max(sy, ey);
    ctx.fillStyle = "rgba(127, 200, 255, 0.18)";
    ctx.fillRect(xLo * TILE, yLo * TILE, (xHi - xLo + 1) * TILE, (yHi - yLo + 1) * TILE);
    ctx.strokeStyle = "#7fc8ff";
    ctx.lineWidth = 2;
    ctx.strokeRect(xLo * TILE, yLo * TILE, (xHi - xLo + 1) * TILE, (yHi - yLo + 1) * TILE);
  } else if (blueprintPlace) {
    const ax = mouseTileX, ay = mouseTileY;
    const ok = blueprintCanPlaceAt(blueprintPlace, ax, ay);
    ctx.globalAlpha = 0.55;
    for (const it of blueprintPlace.items) {
      const cells = footprintCells(it.t, ax + it.dx, ay + it.dy, it.dir);
      let xLo = Infinity, yLo = Infinity, xHi = -Infinity, yHi = -Infinity;
      for (const c of cells) {
        if (c.x < xLo) xLo = c.x;
        if (c.y < yLo) yLo = c.y;
        if (c.x > xHi) xHi = c.x;
        if (c.y > yHi) yHi = c.y;
      }
      ctx.fillStyle = ok ? "rgba(127,255,127,0.35)" : "rgba(255,80,80,0.35)";
      ctx.fillRect(xLo * TILE, yLo * TILE, (xHi - xLo + 1) * TILE, (yHi - yLo + 1) * TILE);
    }
    ctx.globalAlpha = 1;
    ctx.strokeStyle = ok ? "#7fff7f" : "#ff5555";
    ctx.lineWidth = 2;
    let xLo = Infinity, yLo = Infinity, xHi = -Infinity, yHi = -Infinity;
    for (const it of blueprintPlace.items) {
      const cells = footprintCells(it.t, ax + it.dx, ay + it.dy, it.dir);
      for (const c of cells) {
        if (c.x < xLo) xLo = c.x;
        if (c.y < yLo) yLo = c.y;
        if (c.x > xHi) xHi = c.x;
        if (c.y > yHi) yHi = c.y;
      }
    }
    if (xLo !== Infinity) {
      ctx.strokeRect(xLo * TILE, yLo * TILE, (xHi - xLo + 1) * TILE, (yHi - yLo + 1) * TILE);
    }
  }
}

function drawTrain() {
  if (!train) return;
  // Always use the train's current journey path so the parked-vs-moving transition is
  // seamless. If we have no path yet (fresh game / load with no journey done), fall back
  // to a synthetic station-axis path so the cars are positioned through the station.
  let pathCells = train.pathCells;
  let progress = train.pathProgress;
  if (!pathCells || pathCells.length < 2) {
    if (train.parkedStationIndex == null) return;
    const s = stations[train.parkedStationIndex];
    if (!s) return;
    pathCells = stationCenterline(s);
    progress = pathCells.length - 1;
  }
  if (!pathCells || pathCells.length < 2) return;

  // Wheel offsets in tile units, measured back from the locomotive nose.
  const locoFrontP = progress;
  const locoBackP  = progress - LOCOMOTIVE_L;
  const storFrontP = progress - LOCOMOTIVE_L - COUPLING_GAP;
  const storBackP  = progress - LOCOMOTIVE_L - COUPLING_GAP - STORAGE_L;
  const locoF = pathPositionAt(pathCells, locoFrontP);
  const locoB = pathPositionAt(pathCells, locoBackP);
  const storF = pathPositionAt(pathCells, storFrontP);
  const storB = pathPositionAt(pathCells, storBackP);

  // Coupling line between the inner pair of wheels.
  ctx.strokeStyle = "#999";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(locoB.x, locoB.y);
  ctx.lineTo(storF.x, storF.y);
  ctx.stroke();

  if (train.flipped) {
    // Storage car at the lead pair, locomotive at the trail pair.
    drawCarFromWheels(locoF, locoB, "#a87a44", false);
    drawCarFromWheels(storF, storB, "#3a3a3a", true);
  } else {
    drawCarFromWheels(locoF, locoB, "#3a3a3a", true);
    drawCarFromWheels(storF, storB, "#a87a44", false);
  }
}

// Build a list of cells along a station's long axis from outer end → inner end.
// "Inner end" is where the locomotive's nose stops. Step by 1 tile per entry to keep math simple.
function stationCenterline(s) {
  const cells = s.cells || [{ x: s.x, y: s.y }];
  let xMinT = Infinity, yMinT = Infinity, xMaxT = -Infinity, yMaxT = -Infinity;
  for (const c of cells) {
    if (c.x < xMinT) xMinT = c.x;
    if (c.y < yMinT) yMinT = c.y;
    if (c.x > xMaxT) xMaxT = c.x;
    if (c.y > yMaxT) yMaxT = c.y;
  }
  const horizontal = (xMaxT - xMinT) > (yMaxT - yMinT);
  const path = [];
  if (horizontal) {
    const y = (yMinT + yMaxT) / 2;
    for (let x = xMinT; x <= xMaxT; x++) path.push({ x, y });
  } else {
    const x = (xMinT + xMaxT) / 2;
    for (let y = yMinT; y <= yMaxT; y++) path.push({ x, y });
  }
  return path;
}

// Draw a car as a rotated rectangle stretched between its two wheels.
function drawCarFromWheels(wf, wb, color, isLocomotive) {
  const dx = wf.x - wb.x, dy = wf.y - wb.y;
  const length = Math.hypot(dx, dy);
  if (length < 0.5) return;
  const angle = Math.atan2(dy, dx);
  const midx = (wf.x + wb.x) / 2;
  const midy = (wf.y + wb.y) / 2;
  ctx.save();
  ctx.translate(midx, midy);
  ctx.rotate(angle);
  // shadow
  ctx.fillStyle = "rgba(0,0,0,0.35)";
  ctx.fillRect(-length/2 + 2, -CAR_W_PX/2 + 3, length, CAR_W_PX);
  // body
  ctx.fillStyle = color;
  ctx.fillRect(-length/2, -CAR_W_PX/2, length, CAR_W_PX);
  ctx.strokeStyle = "#000";
  ctx.lineWidth = 1;
  ctx.strokeRect(-length/2, -CAR_W_PX/2, length, CAR_W_PX);
  if (isLocomotive) {
    ctx.fillStyle = "#1a1a1a";
    ctx.fillRect(length/2 - 10, -CAR_W_PX/2 + 3, 6, CAR_W_PX - 6);
    ctx.fillStyle = "#ffeebb";
    ctx.fillRect(length/2 - 3, -3, 4, 6);
  } else {
    const innerLen = length - 8;
    ctx.fillStyle = "#222";
    ctx.fillRect(-length/2 + 4, -3, innerLen, 6);
    ctx.fillStyle = "#ffd700";
    ctx.fillRect(-length/2 + 4, -3, innerLen * (train.inventory / TRAIN_INVENTORY_MAX), 6);
  }
  ctx.restore();
  // Wheels: solid dark circles at each wheel position (drawn last so they sit on top).
  ctx.fillStyle = "#0c0c0c";
  ctx.beginPath(); ctx.arc(wf.x, wf.y, WHEEL_R, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(wb.x, wb.y, WHEEL_R, 0, Math.PI * 2); ctx.fill();
}

function drawRailToolPreview() {
  if (selectedBuilding !== BTYPE.RAIL || !railToolStart) return;
  if (!inBounds(mouseTileX, mouseTileY)) return;
  const path = findRailPath(railToolStart, { x: mouseTileX, y: mouseTileY });
  if (!path) {
    ctx.fillStyle = "rgba(255,80,80,0.5)";
    ctx.fillRect(railToolStart.x * TILE, railToolStart.y * TILE, TILE, TILE);
    return;
  }
  ctx.fillStyle = "rgba(255, 215, 0, 0.35)";
  for (const c of path) ctx.fillRect(c.x * TILE, c.y * TILE, TILE, TILE);
}

function loop(now) {
  let frameTime = now - lastTime;
  if (frameTime > 250) frameTime = 250;
  lastTime = now;
  accumulator += frameTime;
  while (accumulator >= FIXED_DT) {
    update(FIXED_DT);
    accumulator -= FIXED_DT;
  }
  render();
  requestAnimationFrame(loop);
}
updateCamera();
requestAnimationFrame(loop);
</script>
