<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Factory Defense</title>
<style>
  html, body { margin: 0; padding: 0; background: #1a1a1a; height: 100%; overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center; font-family: ui-monospace, "Cascadia Mono", "Consolas", monospace; }
  #game { display: block; background: #2d3a2d; image-rendering: pixelated; cursor: crosshair;
          width: min(100vw, calc(100vh * 3 / 2));
          height: min(100vh, calc(100vw * 2 / 3)); }
  #overlay { position: fixed; inset: 0; pointer-events: none; display: flex; align-items: center; justify-content: center; }
  #overlay .panel { pointer-events: auto; background: rgba(0,0,0,0.75); color: #fff; padding: 24px 32px; border: 2px solid #ffd700; text-align: center; font-size: 18px; }
  #overlay button { margin-top: 16px; padding: 8px 16px; font-family: inherit; font-size: 16px; background: #ffd700; color: #000; border: none; cursor: pointer; }
  #overlay button:hover { background: #ffea66; }
  #hud { position: fixed; top: 12px; left: 12px; pointer-events: none; color: #ffd700;
         font-family: ui-monospace, Consolas, monospace; text-shadow: 0 0 3px #000, 0 0 3px #000; }
  #hud .wave { background: rgba(0,0,0,0.7); border: 2px solid #ffd700; padding: 8px 14px;
               font-size: 24px; font-weight: bold; min-width: 220px; }
  #hud .wave .sub { display: block; font-size: 13px; color: #fff; font-weight: normal; margin-top: 4px; }
  #hud .hp { margin-top: 8px; width: 240px; height: 20px; background: #400; border: 1px solid #000;
             position: relative; overflow: hidden; }
  #hud .hp .fill { background: #d22; height: 100%; transition: width 0.1s; }
  #hud .hp .label { position: absolute; left: 6px; top: 2px; color: #fff; font-size: 12px; }
  #hud .skip { margin-top: 8px; width: 244px; padding: 6px 0; pointer-events: auto; cursor: pointer;
               background: #ffd700; color: #000; border: 2px solid #000; font-family: inherit;
               font-size: 14px; font-weight: bold; text-align: center; }
  #hud .skip:hover:not(:disabled) { background: #ffea66; }
  #hud .skip:disabled { background: #555; color: #888; cursor: not-allowed; }
  #hud .train { margin-top: 6px; color: #ffd700; font-size: 12px; background: rgba(0,0,0,0.55); padding: 4px 6px; }
  #scheduleModal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
                   background: rgba(0,0,0,0.65); z-index: 100; }
  #scheduleModal.open { display: flex; }
  #scheduleModal .panel { background: #1a1a1a; border: 2px solid #ffd700; padding: 18px 22px;
                          color: #fff; font-family: ui-monospace, Consolas, monospace; min-width: 380px; }
  #scheduleModal h3 { margin: 0 0 12px 0; color: #ffd700; }
  #scheduleModal .row { display: flex; gap: 8px; align-items: center; margin: 6px 0; }
  #scheduleModal label { width: 60px; }
  #scheduleModal select { background: #2a2a2a; color: #fff; border: 1px solid #555; padding: 4px; font-family: inherit; }
  #scheduleModal .actions { margin-top: 12px; display: flex; gap: 8px; justify-content: flex-end; }
  #scheduleModal button { padding: 6px 14px; background: #ffd700; color: #000; border: none; cursor: pointer; font-family: inherit; font-weight: bold; }
  #scheduleModal button.secondary { background: #555; color: #fff; }
  #blueprintModal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
                    background: rgba(0,0,0,0.65); z-index: 100; }
  #blueprintModal.open { display: flex; }
  #blueprintModal .panel { background: #1a1a1a; border: 2px solid #ffd700; padding: 18px 22px;
                            color: #fff; font-family: ui-monospace, Consolas, monospace; min-width: 360px;
                            max-width: 480px; }
  #blueprintModal h3 { margin: 0 0 12px 0; color: #ffd700; }
  #blueprintList { list-style: none; padding: 0; margin: 0 0 12px 0; max-height: 280px; overflow-y: auto; }
  #blueprintList li { display: flex; gap: 6px; margin: 4px 0; }
  #blueprintList li button.bpName { flex: 1; text-align: left; padding: 6px 10px; background: #2a2a2a;
                                    color: #fff; border: 1px solid #555; cursor: pointer;
                                    font-family: inherit; }
  #blueprintList li button.bpName:hover { background: #3a3a3a; }
  #blueprintList li button.bpDel { padding: 6px 10px; background: #5a2424; color: #fff; border: none;
                                    cursor: pointer; font-family: inherit; }
  #blueprintList li button.bpDel:hover { background: #7a3030; }
  #blueprintList .empty { color: #888; padding: 4px 0; }
  #blueprintModal .actions { display: flex; gap: 8px; justify-content: flex-end; }
  #blueprintModal button { padding: 6px 14px; background: #ffd700; color: #000; border: none; cursor: pointer; font-family: inherit; font-weight: bold; }
  #blueprintModal button.secondary { background: #555; color: #fff; }
</style>
</head>
<body>
<canvas id="game" width="1440" height="960" tabindex="0"></canvas>
<div id="hud">
  <div class="wave">WAVE <span id="hudWaveNum">0</span><span class="sub" id="hudWaveSub">Next in 30s</span></div>
  <div class="hp"><div class="fill" id="hudHpFill" style="width:100%"></div><span class="label" id="hudHpLabel">HP 100/100</span></div>
  <button class="skip" id="hudSkipBtn" type="button">Start next wave</button>
  <div class="train" id="hudTrain" style="display:none">Train: —</div>
</div>
<div id="scheduleModal">
  <div class="panel">
    <h3>Train Schedule</h3>
    <div class="row">
      <label>Stop 1</label>
      <select id="schStop1Station"></select>
      <select id="schStop1Cond"><option value="full">until full</option><option value="empty">until empty</option></select>
    </div>
    <div class="row">
      <label>Stop 2</label>
      <select id="schStop2Station"></select>
      <select id="schStop2Cond"><option value="full">until full</option><option value="empty">until empty</option></select>
    </div>
    <div class="actions">
      <button class="secondary" id="schCloseBtn" type="button">Close</button>
      <button id="schSaveBtn" type="button">Save</button>
    </div>
  </div>
</div>
<div id="blueprintModal">
  <div class="panel">
    <h3>Blueprints</h3>
    <ul id="blueprintList"></ul>
    <div class="actions">
      <button class="secondary" id="bpCloseBtn" type="button">Close</button>
      <button id="bpCreateBtn" type="button">Create new</button>
    </div>
  </div>
</div>
<div id="overlay"></div>
<script>
"use strict";

// ============================================================
// Constants
// ============================================================
const TILE = 24;
const WORLD_MAX_COLS = 2000;
const WORLD_MAX_ROWS = 1500;
const INITIAL_COLS = 120;
const INITIAL_ROWS = 80;
const WORLD_GROW_PER_WAVE = 4; // tiles added on each side per wave
const ORE_PATCHES_PER_WAVE = 1;
const VIEW_W = 1440;
const VIEW_H = 960;
// Active region bounds in tile coords (mutable). Tiles outside are unrenderable/unwalkable.
let xMin, yMin, xMax, yMax;
let W = 0, H = 0; // active region in pixels — recomputed on bounds change
function recomputeWH() { W = (xMax - xMin) * TILE; H = (yMax - yMin) * TILE; }
function setInitialActiveBounds() {
  xMin = Math.floor((WORLD_MAX_COLS - INITIAL_COLS) / 2);
  yMin = Math.floor((WORLD_MAX_ROWS - INITIAL_ROWS) / 2);
  xMax = xMin + INITIAL_COLS;
  yMax = yMin + INITIAL_ROWS;
  recomputeWH();
}
setInitialActiveBounds();
const FIXED_DT = 1000 / 60; // 16.67ms

const DIR = { UP:0, RIGHT:1, DOWN:2, LEFT:3 };
const DX = [0, 1, 0, -1];
const DY = [-1, 0, 1, 0];
const DIR_RAD = [-Math.PI/2, 0, Math.PI/2, Math.PI];

const BTYPE = { MINER:1, BELT:2, ASSEMBLER:3, TURRET:4, WALL:5, SPLITTER:6, HEAVY_TURRET:7, UNDERGROUND_BELT:8, SNIPER_TURRET:9, RAIL:10, STATION:11, ARTILLERY:12, HEAVY_ASSEMBLER:13, BIG_DRILL:14 };
const BIG_DRILL_UNLOCK_WAVE = 100;
const BIG_DRILL_INTERVAL = 1000 / 9;     // 9 normal miners' worth of mining throughput
const BIG_DRILL_RANGE = 1;               // tiles beyond the 3x3 footprint → 5x5 total scan area
const HEAVY_ASSEMBLER_INTERVAL = 2500;
const HEAVY_ASSEMBLER_HEAVY_BUF_MAX = 12;
const HEAVY_ASSEMBLER_ORE_BUF_MAX = 60;
const RAIL_UNLOCK_WAVE = 25;
const TRAIN_INVENTORY_MAX = 250;
const STATION_W = 1;
const STATION_L = 10;
const LOCOMOTIVE_L = 5;
const STORAGE_L = 5;
const TRAIN_SPEED = 4 * TILE / 1000; // px per ms
const CAR_W_PX = 18;       // rendered car body width
const WHEEL_R = 3.5;
const COUPLING_GAP = 0.4;  // tile units between locomotive back wheel and storage car front wheel
const TRAIN_OUTPUT_INTERVAL = 100; // ms between unload transfers
const MAX_STATIONS = 2;
const SNIPER_TURRET_UNLOCK_WAVE = 10;
const SNIPER_TURRET_RANGE = 12 * TILE * 5; // 5x normal turret
const SNIPER_TURRET_INTERVAL = 1000;
const SNIPER_TURRET_DMG = 9999; // one-shot
const SNIPER_TURRET_AMMO_MAX = 2; // heavy ammo items
const SNIPER_RECOIL_MS = 180;
// Turret turning speed (radians per ms). Bigger guns turn slower.
const TURRET_TURN_RATE = 0.008;
const HEAVY_TURRET_TURN_RATE = 0.005;
const SNIPER_TURRET_TURN_RATE = 0.002;
const ARTILLERY_TURN_RATE = 0.0008;
const TURRET_AIM_TOLERANCE = 0.08; // radians; barrel must be within this of the target to fire
// Artillery turret (3x3, fires SHELL projectiles).
const ARTILLERY_UNLOCK_WAVE = 30;
const ARTILLERY_RANGE = 225 * TILE;
const ARTILLERY_MIN_RANGE = 25 * TILE;
const ARTILLERY_INTERVAL = 4000;       // 4 s between shells
const ARTILLERY_SHELL_BUF_MAX = 5;     // shells stored in the artillery
const ARTILLERY_SHELL_SPEED = 30 * TILE / 1000; // 30 tiles / sec
const ARTILLERY_BLAST_RADIUS = 5 * TILE;        // 10-tile-wide explosion (radius 5)
// Shell crafting at the assembler.
const SHELL_HEAVY_COST = 2;
const SHELL_ORE_COST = 10;
const ASSEMBLER_HEAVY_BUF_MAX = 12;
const UNDERGROUND_BELT_RANGE = 5;
const ITEM = { ORE:1, AMMO:2, HEAVY_AMMO:3, SHELL:4 };
const HEAVY_TURRET_UNLOCK_WAVE = 10;
const HEAVY_TURRET_AMMO_MAX = 50;
const HEAVY_TURRET_INTERVAL = 100; // 10 bullets/sec sustained
const HEAVY_TURRET_DMG_PER_BULLET = 12; // ~0.5x normal turret's 25
const HEAVY_AMMO_PER_HEAVY_TURRET = 10;
const HEAVY_AMMO_PER_NORMAL_TURRET = 4;

const PLAYER_SPEED = 4 * TILE / 1000; // tiles/sec → px/ms
const PLAYER_MAX_HP = 100;
const ZOMBIE_SPEED = 1.5 * TILE / 1000;
const ZOMBIE_HP = 50;
const ZOMBIE_DMG_PER_SEC = 10;
const PLAYER_DMG_PER_SEC = 10;
// Player handgun (Space to fire toward the mouse cursor).
const PLAYER_GUN_RELOAD = 2500;                       // ms between shots
const PLAYER_BULLET_SPEED = 50 * TILE / 1000;         // 50 tiles / sec
const PLAYER_BULLET_RANGE = 20 * TILE;                // tiles before despawn
const PLAYER_BULLET_DMG = 50;                          // 1-shots a fresh zombie
const WALL_HP = 200;

const MINER_INTERVAL = 1000;
const BELT_INTERVAL = 500;
const ASSEMBLER_INTERVAL = 2000;
const TURRET_INTERVAL = 800;
const TURRET_RANGE = 12 * TILE;
const TURRET_DMG = 25;
const TURRET_AMMO_MAX = 20;

const WAVE_FIRST_DELAY = 120000; // 2 minute grace period
const WAVE_INTERVAL = 60000;
const WAVE_SPAWN_WINDOW = 10000;

// Palette
const COL = {
  ground: "#2d3a2d",
  oreTile: "#6b7d8f",
  oreDot: "#9aa9b8",
  player: "#f4e4bc",
  playerOutline: "#7a6940",
  miner: "#8b6f47",
  belt: "#4a4a4a",
  beltArrow: "#ffd700",
  assembler: "#a0522d",
  turret: "#555555",
  wall: "#888888",
  ore: "#c0c0c0",
  ammo: "#ffcc00",
  zombie: "#4a7c4a",
  zombieEye: "#1a2f1a",
  bullet: "#ffffff",
  shadow: "rgba(0,0,0,0.35)",
  grid: "#26312a",
  selected: "#ffd700",
  hpBack: "#400",
  hpFill: "#d22",
};

// ============================================================
// Input
// ============================================================
const keys = {};
let mouseX = 0, mouseY = 0; // world coords
let mouseScreenX = 0, mouseScreenY = 0; // canvas coords
let mouseTileX = 0, mouseTileY = 0;
let camX = 0, camY = 0;
let leftClickQueued = false;
let rightClickQueued = false;
let placementDir = DIR.RIGHT;
let selectedBuilding = BTYPE.MINER;
let paused = false;
let gameOver = false;
let showMap = false;
let pendingConfirm = null; // null | "save" | "load" | "newworld"
let railToolStart = null; // { x, y } first-click tile when laying rail
let scheduleModalOpen = false;
let loadingBuildings = false; // bypasses placement-time validations during loadGame
// Blueprint state
let blueprints = [];               // [{ name, items: [{ t, dx, dy, dir }] }]
let blueprintModalOpen = false;
let blueprintCapture = null;       // { name, start: {x,y}|null }
let blueprintPlace = null;         // a blueprint object the player is placing
// Full-map pan/zoom state (only used when showMap is true).
let mapView = { centerX: 0, centerY: 0, zoom: 1 };
let mapDrag = null; // { lastScreenX, lastScreenY }
let bigMapRect = null; // { x, y, w, h } in canvas pixels — set each frame the map is drawn
let worldGenOpen = false;
const worldGenSettings = { count: 8, inset: 12, gap: 4 };
let worldGenPreview = null; // 2D array of ore counts

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

window.addEventListener("keydown", (e) => {
  if (gameOver) return;
  const k = e.key.toLowerCase();
  keys[k] = true;
  // Confirm dialog intercepts input while open
  if (pendingConfirm) {
    if (k === "y" || k === "enter") {
      if (pendingConfirm === "save") saveGame();
      else if (pendingConfirm === "load") loadGame();
      else if (pendingConfirm === "newworld") { applyNewWorld(); worldGenOpen = false; worldGenPreview = null; }
      pendingConfirm = null;
    } else if (k === "n" || k === "escape") {
      pendingConfirm = null;
    }
    return;
  }
  // World-gen dialog intercepts input while open
  if (worldGenOpen) {
    if (k === "escape") { worldGenOpen = false; worldGenPreview = null; }
    else if (k === "=" || k === "+") { worldGenSettings.count = Math.min(30, worldGenSettings.count + 1); regenWorldPreview(); }
    else if (k === "-" || k === "_") { worldGenSettings.count = Math.max(1, worldGenSettings.count - 1); regenWorldPreview(); }
    else if (k === "]") { worldGenSettings.inset = Math.min(30, worldGenSettings.inset + 1); regenWorldPreview(); }
    else if (k === "[") { worldGenSettings.inset = Math.max(0, worldGenSettings.inset - 1); regenWorldPreview(); }
    else if (k === ".") { worldGenSettings.gap = Math.min(15, worldGenSettings.gap + 1); regenWorldPreview(); }
    else if (k === ",") { worldGenSettings.gap = Math.max(0, worldGenSettings.gap - 1); regenWorldPreview(); }
    else if (k === " " || k === "spacebar") { regenWorldPreview(); }
    else if (k === "enter") { pendingConfirm = "newworld"; }
    return;
  }
  if (k === "1") selectedBuilding = BTYPE.MINER;
  else if (k === "2") selectedBuilding = BTYPE.BELT;
  else if (k === "3") selectedBuilding = BTYPE.ASSEMBLER;
  else if (k === "4") selectedBuilding = BTYPE.TURRET;
  else if (k === "5") selectedBuilding = BTYPE.WALL;
  else if (k === "6") selectedBuilding = BTYPE.SPLITTER;
  else if (k === "7") { if (waveState.waveNumber >= HEAVY_TURRET_UNLOCK_WAVE) selectedBuilding = BTYPE.HEAVY_TURRET; else showToast("Heavy turret unlocks at wave " + HEAVY_TURRET_UNLOCK_WAVE); }
  else if (k === "8") selectedBuilding = BTYPE.UNDERGROUND_BELT;
  else if (k === "9") { if (waveState.waveNumber >= SNIPER_TURRET_UNLOCK_WAVE) selectedBuilding = BTYPE.SNIPER_TURRET; else showToast("Sniper turret unlocks at wave " + SNIPER_TURRET_UNLOCK_WAVE); }
  else if (k === "0") { if (waveState.waveNumber >= RAIL_UNLOCK_WAVE) { selectedBuilding = BTYPE.RAIL; railToolStart = null; } else showToast("Railway unlocks at wave " + RAIL_UNLOCK_WAVE); }
  else if (k === "-") { if (waveState.waveNumber >= RAIL_UNLOCK_WAVE) selectedBuilding = BTYPE.STATION; else showToast("Railway unlocks at wave " + RAIL_UNLOCK_WAVE); }
  else if (k === "=") { if (waveState.waveNumber >= ARTILLERY_UNLOCK_WAVE) selectedBuilding = BTYPE.ARTILLERY; else showToast("Artillery unlocks at wave " + ARTILLERY_UNLOCK_WAVE); }
  else if (k === "[") { if (waveState.waveNumber >= ARTILLERY_UNLOCK_WAVE) selectedBuilding = BTYPE.HEAVY_ASSEMBLER; else showToast("Heavy assembler unlocks at wave " + ARTILLERY_UNLOCK_WAVE); }
  else if (k === "]") { if (waveState.waveNumber >= BIG_DRILL_UNLOCK_WAVE) selectedBuilding = BTYPE.BIG_DRILL; else showToast("Big drill unlocks at wave " + BIG_DRILL_UNLOCK_WAVE); }
  else if (k === "r") placementDir = (placementDir + 1) % 4;
  else if (k === "escape") paused = !paused;
  else if (k === "f") pendingConfirm = "save";
  else if (k === "l") pendingConfirm = "load";
  else if (k === "m") {
    showMap = !showMap;
    if (showMap) {
      // Reset view to player-centered, zoom 1 (whole active region fits).
      mapView.centerX = (xMin + xMax) / 2;
      mapView.centerY = (yMin + yMax) / 2;
      mapView.zoom = 1;
    }
  }
  else if (k === "g") { worldGenOpen = true; regenWorldPreview(); }
  else if (k === " " || k === "spacebar") { e.preventDefault(); firePlayerGun(); }
  else if (k === "b") {
    // B cancels any in-progress capture/place; otherwise opens the blueprint list.
    if (blueprintPlace) { blueprintPlace = null; showToast("Cancelled"); }
    else if (blueprintCapture) { blueprintCapture = null; showToast("Capture cancelled"); }
    else openBlueprintModal();
  }
});
window.addEventListener("keyup", (e) => { keys[e.key.toLowerCase()] = false; });

canvas.addEventListener("mousemove", (e) => {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const sy = canvas.height / rect.height;
  const newScreenX = (e.clientX - rect.left) * sx;
  const newScreenY = (e.clientY - rect.top) * sy;
  // Map pan: convert screen-pixel delta to tile delta and shift center.
  if (mapDrag && bigMapRect) {
    const dxPx = newScreenX - mapDrag.lastScreenX;
    const dyPx = newScreenY - mapDrag.lastScreenY;
    const b = computeFullMapBounds();
    const tilesPerMapPxX = (b.xMax - b.xMin) / bigMapRect.w;
    const tilesPerMapPxY = (b.yMax - b.yMin) / bigMapRect.h;
    mapView.centerX -= dxPx * tilesPerMapPxX;
    mapView.centerY -= dyPx * tilesPerMapPxY;
    mapDrag.lastScreenX = newScreenX;
    mapDrag.lastScreenY = newScreenY;
  }
  mouseScreenX = newScreenX;
  mouseScreenY = newScreenY;
  mouseX = mouseScreenX + camX;
  mouseY = mouseScreenY + camY;
  mouseTileX = Math.floor(mouseX / TILE);
  mouseTileY = Math.floor(mouseY / TILE);
});
let rightHeld = false;
let leftHeld = false;

function pointInRect(x, y, r) {
  return r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
}

// Returns the visible tile-coord rect of the full map at current pan/zoom.
function computeFullMapBounds() {
  const aW = (xMax - xMin), aH = (yMax - yMin);
  const visW = aW / mapView.zoom;
  const visH = aH / mapView.zoom;
  return {
    xMin: mapView.centerX - visW / 2,
    yMin: mapView.centerY - visH / 2,
    xMax: mapView.centerX + visW / 2,
    yMax: mapView.centerY + visH / 2,
  };
}

canvas.addEventListener("mousedown", (e) => {
  if (gameOver || paused) return;
  if (scheduleModalOpen) return;
  // Map drag intercepts left-click while M overlay is open and the cursor is over the map.
  if (showMap && e.button === 0 && pointInRect(mouseScreenX, mouseScreenY, bigMapRect)) {
    mapDrag = { lastScreenX: mouseScreenX, lastScreenY: mouseScreenY };
    return;
  }
  if (showMap) return; // ignore world clicks while map is open
  if (e.button === 0) { leftClickQueued = true; leftHeld = true; }
  else if (e.button === 2) { rightClickQueued = true; rightHeld = true; }
});
window.addEventListener("mouseup", (e) => {
  if (e.button === 2) rightHeld = false;
  if (e.button === 0) { mapDrag = null; leftHeld = false; }
});

function isSlotLocked(type) {
  if (type === BTYPE.HEAVY_TURRET && waveState.waveNumber < HEAVY_TURRET_UNLOCK_WAVE) return true;
  if (type === BTYPE.SNIPER_TURRET && waveState.waveNumber < SNIPER_TURRET_UNLOCK_WAVE) return true;
  if ((type === BTYPE.RAIL || type === BTYPE.STATION) && waveState.waveNumber < RAIL_UNLOCK_WAVE) return true;
  if ((type === BTYPE.ARTILLERY || type === BTYPE.HEAVY_ASSEMBLER) && waveState.waveNumber < ARTILLERY_UNLOCK_WAVE) return true;
  if (type === BTYPE.BIG_DRILL && waveState.waveNumber < BIG_DRILL_UNLOCK_WAVE) return true;
  return false;
}

canvas.addEventListener("wheel", (e) => {
  // Zoom the map if it's open and the cursor is over it.
  if (showMap && pointInRect(mouseScreenX, mouseScreenY, bigMapRect)) {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.25 : 1 / 1.25;
    const oldB = computeFullMapBounds();
    const oldW = oldB.xMax - oldB.xMin, oldH = oldB.yMax - oldB.yMin;
    const u = (mouseScreenX - bigMapRect.x) / bigMapRect.w;
    const v = (mouseScreenY - bigMapRect.y) / bigMapRect.h;
    const tileAtCursorX = oldB.xMin + u * oldW;
    const tileAtCursorY = oldB.yMin + v * oldH;
    mapView.zoom = Math.max(0.25, Math.min(8, mapView.zoom * factor));
    const newW = oldW / factor, newH = oldH / factor;
    mapView.centerX = tileAtCursorX - (u - 0.5) * newW;
    mapView.centerY = tileAtCursorY - (v - 0.5) * newH;
    return;
  }
  if (scheduleModalOpen || pendingConfirm || worldGenOpen) return;
  // Otherwise: cycle the hotbar selection. Skip locked slots.
  e.preventDefault();
  const slots = 14;
  const dir = e.deltaY > 0 ? 1 : -1;
  let next = selectedBuilding;
  for (let i = 0; i < slots; i++) {
    next += dir;
    if (next < 1) next = slots;
    if (next > slots) next = 1;
    if (!isSlotLocked(next)) break;
  }
  selectedBuilding = next;
}, { passive: false });
canvas.addEventListener("contextmenu", (e) => e.preventDefault());

// ============================================================
// World
// ============================================================
// Ore storage: flat Uint16Array, 2 bytes per tile (max ore 500 fits easily). Massively cheaper
// than millions of {ore:0} objects, which lets us pre-allocate a much bigger world buffer
// so the world can keep growing well past wave 100.
const ore = new Uint16Array(WORLD_MAX_COLS * WORLD_MAX_ROWS);
function oreIdx(x, y) { return y * WORLD_MAX_COLS + x; }
function oreAt(x, y) { return ore[y * WORLD_MAX_COLS + x]; }
function setOre(x, y, v) { ore[y * WORLD_MAX_COLS + x] = v; }
function clearAllOre() { ore.fill(0); }

function inBounds(x, y) { return x >= xMin && y >= yMin && x < xMax && y < yMax; }

const ORE_PATCH_COUNT = 8;
const ORE_EDGE_INSET = 12;
const ORE_PATCH_GAP = 4;

// Generates an ore-count grid (sized as the full WORLD buffer) using the given settings.
// Generates patches strictly inside the active region (xMin..xMax, yMin..yMax) inset by settings.inset.
function getInitialBounds() {
  const x0 = Math.floor((WORLD_MAX_COLS - INITIAL_COLS) / 2);
  const y0 = Math.floor((WORLD_MAX_ROWS - INITIAL_ROWS) / 2);
  return { xMin: x0, yMin: y0, xMax: x0 + INITIAL_COLS, yMax: y0 + INITIAL_ROWS };
}

function genOreGrid(settings, bounds) {
  const b = bounds || { xMin, yMin, xMax, yMax };
  // Use a flat Uint16Array indexed [y*WORLD_MAX_COLS + x]; matches the live `ore` buffer layout
  // so we can blit it in with `ore.set(grid)`.
  const grid = new Uint16Array(WORLD_MAX_COLS * WORLD_MAX_ROWS);
  let placed = 0, attempts = 0;
  const maxAttempts = 6000;
  while (placed < settings.count && attempts < maxAttempts) {
    attempts++;
    const w = 3 + Math.floor(Math.random() * 3);
    const h = 3 + Math.floor(Math.random() * 3);
    const minX = b.xMin + settings.inset;
    const maxX = b.xMax - settings.inset - w;
    const minY = b.yMin + settings.inset;
    const maxY = b.yMax - settings.inset - h;
    if (maxX < minX || maxY < minY) break;
    const x = minX + Math.floor(Math.random() * (maxX - minX + 1));
    const y = minY + Math.floor(Math.random() * (maxY - minY + 1));
    const cx = (b.xMin + b.xMax) / 2, cy = (b.yMin + b.yMax) / 2;
    if (Math.abs(x + w/2 - cx) < 6 && Math.abs(y + h/2 - cy) < 6) continue;
    let empty = true;
    for (let dy = -settings.gap; dy < h + settings.gap && empty; dy++) {
      for (let dx = -settings.gap; dx < w + settings.gap; dx++) {
        const tx = x + dx, ty = y + dy;
        if (tx < 0 || ty < 0 || tx >= WORLD_MAX_COLS || ty >= WORLD_MAX_ROWS) continue;
        if (grid[ty * WORLD_MAX_COLS + tx] > 0) { empty = false; break; }
      }
    }
    if (!empty) continue;
    for (let dy = 0; dy < h; dy++) for (let dx = 0; dx < w; dx++) {
      grid[(y+dy) * WORLD_MAX_COLS + (x+dx)] = 500;
    }
    placed++;
  }
  return { grid, placed };
}

function generateOrePatches() {
  const result = genOreGrid({ count: ORE_PATCH_COUNT, inset: ORE_EDGE_INSET, gap: ORE_PATCH_GAP });
  ore.set(result.grid);
}

// Place `count` ore patches in the freshly-revealed ring (newly added tiles outside prevB but inside newB),
// respecting a buffer against existing ore and avoiding occupied building tiles.
function growOreInRing(prevB, count, sizeMin, sizeMax) {
  const gap = ORE_PATCH_GAP;
  const lo = sizeMin || 3;
  const hi = sizeMax || 5;
  let placed = 0, attempts = 0;
  while (placed < count && attempts < 4000) {
    attempts++;
    const w = lo + Math.floor(Math.random() * (hi - lo + 1));
    const h = lo + Math.floor(Math.random() * (hi - lo + 1));
    const minX = xMin + 2;
    const maxX = xMax - 2 - w;
    const minY = yMin + 2;
    const maxY = yMax - 2 - h;
    if (maxX < minX || maxY < minY) break;
    const x = minX + Math.floor(Math.random() * (maxX - minX + 1));
    const y = minY + Math.floor(Math.random() * (maxY - minY + 1));
    // Require at least one tile of the patch to lie OUTSIDE the previous active region.
    let inRing = false;
    for (let dy = 0; dy < h && !inRing; dy++) for (let dx = 0; dx < w; dx++) {
      const tx = x + dx, ty = y + dy;
      if (tx < prevB.xMin || tx >= prevB.xMax || ty < prevB.yMin || ty >= prevB.yMax) { inRing = true; break; }
    }
    if (!inRing) continue;
    let empty = true;
    for (let dy = -gap; dy < h + gap && empty; dy++) {
      for (let dx = -gap; dx < w + gap; dx++) {
        const tx = x + dx, ty = y + dy;
        if (tx < 0 || ty < 0 || tx >= WORLD_MAX_COLS || ty >= WORLD_MAX_ROWS) continue;
        if (oreAt(tx, ty) > 0) { empty = false; break; }
      }
    }
    if (!empty) continue;
    let blocked = false;
    for (let dy = 0; dy < h && !blocked; dy++) for (let dx = 0; dx < w; dx++) {
      if (buildingAt(x+dx, y+dy)) { blocked = true; break; }
    }
    if (blocked) continue;
    for (let dy = 0; dy < h; dy++) for (let dx = 0; dx < w; dx++) setOre(x+dx, y+dy, 500);
    placed++;
  }
  return placed;
}

function growWorld() {
  // Growth phases:
  //   waves 1-15  : grow by 4 each side, 1 small patch each wave
  //   waves 16-99 : frozen
  //   waves 100+  : grow by 10 each side, 1 patch every 2 waves, patches grow up to 10x10
  const w = waveState.waveNumber;
  const earlyPhase = (w >= 1 && w <= 15);
  const latePhase = (w >= 100);
  if (!earlyPhase && !latePhase) return;
  const step = latePhase ? 10 : WORLD_GROW_PER_WAVE;
  const prev = { xMin, yMin, xMax, yMax };
  xMin = Math.max(0, xMin - step);
  yMin = Math.max(0, yMin - step);
  xMax = Math.min(WORLD_MAX_COLS, xMax + step);
  yMax = Math.min(WORLD_MAX_ROWS, yMax + step);
  recomputeWH();
  const grew = (xMin !== prev.xMin || yMin !== prev.yMin || xMax !== prev.xMax || yMax !== prev.yMax);
  if (!grew) return;
  if (earlyPhase) {
    growOreInRing(prev, ORE_PATCHES_PER_WAVE);
  } else {
    // Late phase: spawn a patch every other wave (only on even-numbered waves >= 100).
    if (w % 2 !== 0) return;
    // Patches grow with wave number, capped at 10x10.
    // At wave 100: ~3-5 (same as early). At wave 200: closer to 10.
    const grown = Math.min(10, 3 + Math.floor((w - 100) / 20));
    const lo = Math.min(grown, 5);
    const hi = grown;
    growOreInRing(prev, ORE_PATCHES_PER_WAVE, lo, hi);
  }
}

function regenWorldPreview() {
  // Preview always shows the initial-size active region for a new world.
  const r = genOreGrid(worldGenSettings, getInitialBounds());
  worldGenPreview = r.grid;
  worldGenLastPlaced = r.placed;
}
let worldGenLastPlaced = 0;

function applyNewWorld() {
  // Wipe everything and reset active region to initial
  buildings.clear();
  uniqueBuildings.clear();
  stations.length = 0;
  train = null;
  zombies.length = 0;
  bullets.length = 0;
  playerBullets.length = 0;
  shells.length = 0;
  explosions.length = 0;
  setInitialActiveBounds();
  if (worldGenPreview) ore.set(worldGenPreview);
  else clearAllOre();
  // Reset player to active region center
  player.x = (xMin + xMax) / 2 * TILE;
  player.y = (yMin + yMax) / 2 * TILE;
  player.hp = PLAYER_MAX_HP;
  player.facing = DIR.DOWN;
  player.noZombieTimer = 0;
  // Reset stats and waves
  stats.oreMined = 0;
  stats.ammoProduced = 0;
  waveState.waveNumber = 0;
  waveState.nextWaveAt = WAVE_FIRST_DELAY;
  waveState.spawning = false;
  waveState.spawned = 0;
  waveState.spawnCount = 0;
  updateCamera();
  showToast("New world generated");
}
generateOrePatches();

const player = {
  x: (xMin + xMax) / 2 * TILE,
  y: (yMin + yMax) / 2 * TILE,
  hp: PLAYER_MAX_HP,
  facing: DIR.DOWN,
  noZombieTimer: 0,
  gunCooldown: 0,
};

// Player-fired bullets (separate from turret line-bullets which are visual line traces).
// Each: { x, y, vx, vy, distLeft }
const playerBullets = [];

// ============================================================
// Buildings
// ============================================================
// Map "x,y" -> building object. Multi-tile buildings register the SAME object under every footprint cell.
const buildings = new Map();
// Set of unique building objects (one entry per real building, not per occupied cell).
// Iterate THIS in tick functions instead of buildings.values() to avoid the multi-tile dedup tax.
const uniqueBuildings = new Set();
const stations = []; // up to MAX_STATIONS station building references
function key(x, y) { return x + "," + y; }

function buildingAt(x, y) { return buildings.get(key(x, y)); }

// Returns the list of (x,y) tiles a building of this type/dir occupies, anchored at (ax, ay).
// Anchor = top-left of bounding box for stations; for 1×1 buildings this is just (ax, ay).
function footprintCells(type, ax, ay, dir) {
  if (type === BTYPE.STATION) {
    // 2 wide × 10 long. Long axis follows `dir`. ax/ay is one corner of the bounding box.
    const horizontal = (dir === DIR.LEFT || dir === DIR.RIGHT);
    const W = horizontal ? STATION_L : STATION_W;
    const H = horizontal ? STATION_W : STATION_L;
    const cells = [];
    for (let dy = 0; dy < H; dy++) for (let dx = 0; dx < W; dx++) cells.push({ x: ax + dx, y: ay + dy });
    return cells;
  }
  if (type === BTYPE.ARTILLERY) {
    const cells = [];
    for (let dy = 0; dy < 3; dy++) for (let dx = 0; dx < 3; dx++) cells.push({ x: ax + dx, y: ay + dy });
    return cells;
  }
  if (type === BTYPE.HEAVY_ASSEMBLER) {
    const cells = [];
    for (let dy = 0; dy < 2; dy++) for (let dx = 0; dx < 2; dx++) cells.push({ x: ax + dx, y: ay + dy });
    return cells;
  }
  if (type === BTYPE.BIG_DRILL) {
    const cells = [];
    for (let dy = 0; dy < 3; dy++) for (let dx = 0; dx < 3; dx++) cells.push({ x: ax + dx, y: ay + dy });
    return cells;
  }
  return [{ x: ax, y: ay }];
}

function placeBuilding(type, x, y, dir) {
  // Wave-gated types
  if (type === BTYPE.HEAVY_TURRET && waveState.waveNumber < HEAVY_TURRET_UNLOCK_WAVE) {
    showToast("Heavy turret unlocks at wave " + HEAVY_TURRET_UNLOCK_WAVE); return false;
  }
  if (type === BTYPE.SNIPER_TURRET && waveState.waveNumber < SNIPER_TURRET_UNLOCK_WAVE) {
    showToast("Sniper turret unlocks at wave " + SNIPER_TURRET_UNLOCK_WAVE); return false;
  }
  if ((type === BTYPE.STATION || type === BTYPE.RAIL) && waveState.waveNumber < RAIL_UNLOCK_WAVE) {
    showToast("Railway unlocks at wave " + RAIL_UNLOCK_WAVE); return false;
  }
  if (type === BTYPE.ARTILLERY && waveState.waveNumber < ARTILLERY_UNLOCK_WAVE) {
    showToast("Artillery unlocks at wave " + ARTILLERY_UNLOCK_WAVE); return false;
  }
  if (type === BTYPE.HEAVY_ASSEMBLER && waveState.waveNumber < ARTILLERY_UNLOCK_WAVE) {
    showToast("Heavy assembler unlocks at wave " + ARTILLERY_UNLOCK_WAVE); return false;
  }
  if (type === BTYPE.BIG_DRILL && waveState.waveNumber < BIG_DRILL_UNLOCK_WAVE) {
    showToast("Big drill unlocks at wave " + BIG_DRILL_UNLOCK_WAVE); return false;
  }
  if (type === BTYPE.STATION && stations.length >= MAX_STATIONS) {
    showToast("Maximum " + MAX_STATIONS + " stations"); return false;
  }
  // Validate every footprint cell is in-bounds and unoccupied (and not under the player).
  const cells = footprintCells(type, x, y, dir);
  const ptx = Math.floor(player.x / TILE), pty = Math.floor(player.y / TILE);
  for (const c of cells) {
    if (!inBounds(c.x, c.y)) return false;
    if (buildingAt(c.x, c.y)) return false;
    if (c.x === ptx && c.y === pty) return false;
  }
  if (type === BTYPE.MINER && oreAt(x, y) <= 0 && !loadingBuildings) return false;
  if (type === BTYPE.RAIL) {
    // Can't place a rail directly perpendicular-adjacent to another rail (no parallel runs).
    const isRail = b => b && b.type === BTYPE.RAIL;
    const nUp = buildingAt(x, y - 1), nDown = buildingAt(x, y + 1);
    const nLeft = buildingAt(x - 1, y), nRight = buildingAt(x + 1, y);
    const verticalNeighbor = isRail(nUp) || isRail(nDown);
    const horizontalNeighbor = isRail(nLeft) || isRail(nRight);
    if (verticalNeighbor && horizontalNeighbor) return false;
  }

  const b = { type, x, y, dir, item: null, items: [], buffer: 0, ammo: 0, cooldown: 0, hp: 0, target: null, barrelAngle: 0, cells };
  if (type === BTYPE.BELT) { b.item = null; b.itemProgress = 0; }
  else if (type === BTYPE.TURRET) { b.barrelAngle = DIR_RAD[dir]; }
  else if (type === BTYPE.HEAVY_TURRET) { b.barrelAngle = DIR_RAD[dir]; b.ammo = 0; }
  else if (type === BTYPE.SNIPER_TURRET) { b.barrelAngle = DIR_RAD[dir]; b.ammo = 0; b.recoilT = 0; }
  else if (type === BTYPE.WALL) { b.hp = WALL_HP; }
  else if (type === BTYPE.SPLITTER) { b.item = null; b.outputIndex = 0; }
  else if (type === BTYPE.UNDERGROUND_BELT) { b.item = null; }
  else if (type === BTYPE.RAIL) { /* rails are passive track */ }
  else if (type === BTYPE.ARTILLERY) { b.barrelAngle = DIR_RAD[dir]; b.buffer = 0; b.ammoBuf = 0; }
  else if (type === BTYPE.HEAVY_ASSEMBLER) { b.buffer = 0; b.heavyBuf = 0; b.craftMax = 0; }
  else if (type === BTYPE.BIG_DRILL) { b.drainAccum = 0; b.outputIndex = 0; }
  else if (type === BTYPE.STATION) {
    b.stationIndex = stations.length;
    b.name = (typeof prompt === "function" ? (prompt("Station name?", "Station " + (b.stationIndex + 1)) || "") : "").trim();
    if (!b.name) b.name = "Station " + (b.stationIndex + 1);
    stations.push(b);
  }

  for (const c of cells) buildings.set(key(c.x, c.y), b);
  uniqueBuildings.add(b);
  return true;
}

function removeBuilding(x, y) {
  const b = buildingAt(x, y);
  if (!b) return;
  const cells = b.cells || [{ x: b.x, y: b.y }];
  for (const c of cells) buildings.delete(key(c.x, c.y));
  uniqueBuildings.delete(b);
  if (b.type === BTYPE.STATION) {
    const i = stations.indexOf(b);
    if (i >= 0) stations.splice(i, 1);
    // Reindex
    for (let k = 0; k < stations.length; k++) stations[k].stationIndex = k;
    // Reset train if it was on this station
    if (train && train.parkedStationIndex !== null && train.parkedStationIndex >= stations.length) {
      train.parkedStationIndex = stations.length ? 0 : null;
      train.status = stations.length ? "parked" : "idle";
    }
  }
}

// ============================================================
// Belts & Items
// ============================================================
// Each belt holds at most 1 item with progress 0..1. When progress reaches 1, item attempts to transfer to next tile (belt facing same direction OR a building inlet).

function beltNext(b) {
  const nx = b.x + DX[b.dir], ny = b.y + DY[b.dir];
  return buildingAt(nx, ny);
}

function tickBelts(dt) {
  // collect belts and process; multiple passes to allow chained transfers
  const belts = [];
  for (const b of buildings.values()) if (b.type === BTYPE.BELT) belts.push(b);

  // Advance progress
  for (const b of belts) {
    if (b.item != null) {
      b.itemProgress += dt / BELT_INTERVAL;
      if (b.itemProgress > 1) b.itemProgress = 1;
    }
  }

  // Try to transfer items at end of belt (progress == 1).
  // Multi-pass to allow chained movement within a single tick.
  for (let pass = 0; pass < 4; pass++) {
    let moved = false;
    for (const b of belts) {
      if (b.item == null || b.itemProgress < 1) continue;
      const next = beltNext(b);
      if (!next) continue;
      if (tryAccept(next, b.item, b.dir)) {
        b.item = null;
        b.itemProgress = 0;
        moved = true;
      }
    }
    if (!moved) break;
  }
}

// ============================================================
// Rail / Station / Train
// ============================================================
// A rail-traversable cell is one that is in-bounds and either empty or part of an existing
// rail or station. Used for both BFS pathfinding and the train's path.
function isRailwayCell(x, y) {
  if (!inBounds(x, y)) return false;
  const b = buildingAt(x, y);
  if (!b) return true;
  return b.type === BTYPE.RAIL || b.type === BTYPE.STATION;
}

// 1-wide BFS for the rail centerline. Cells next to existing perpendicular rails
// are blocked so two parallel rails can't end up adjacent.
function findRailPath(start, end) {
  if (!isRailwayCell(start.x, start.y) || !isRailwayCell(end.x, end.y)) return null;
  // A cell is path-walkable if it's railway AND wouldn't sit beside an existing rail
  // perpendicular to our travel direction.
  function walkable(nx, ny, fromDir) {
    if (!isRailwayCell(nx, ny)) return false;
    const p1 = (fromDir + 1) % 4, p2 = (fromDir + 3) % 4;
    const a = buildingAt(nx + DX[p1], ny + DY[p1]);
    const b = buildingAt(nx + DX[p2], ny + DY[p2]);
    if ((a && a.type === BTYPE.RAIL) || (b && b.type === BTYPE.RAIL)) return false;
    return true;
  }
  const visited = new Map();
  const queue = [{ x: start.x, y: start.y, parent: null }];
  visited.set(start.x + "," + start.y, queue[0]);
  let goal = null;
  for (let qi = 0; qi < queue.length; qi++) {
    const cur = queue[qi];
    if (cur.x === end.x && cur.y === end.y) { goal = cur; break; }
    for (let d = 0; d < 4; d++) {
      const nx = cur.x + DX[d], ny = cur.y + DY[d];
      const k = nx + "," + ny;
      if (visited.has(k)) continue;
      if (!walkable(nx, ny, d)) continue;
      const next = { x: nx, y: ny, parent: cur };
      visited.set(k, next);
      queue.push(next);
    }
  }
  if (!goal) return null;
  const centerline = [];
  for (let st = goal; st; st = st.parent) centerline.push({ x: st.x, y: st.y });
  centerline.reverse();
  const cells = centerline.slice();
  cells.centerline = centerline;
  return cells;
}

// True only if the cell IS an existing rail or station tile (not empty ground).
// findRailPath uses isRailwayCell which treats empty cells as walkable (since rails get laid there);
// the train must only walk on actual existing track.
function isExistingRailCell(x, y) {
  if (!inBounds(x, y)) return false;
  const b = buildingAt(x, y);
  return !!b && (b.type === BTYPE.RAIL || b.type === BTYPE.STATION);
}

// Train pathfinder: walks only over actual rail/station cells.
function findTrainPath(start, end) {
  if (!isExistingRailCell(start.x, start.y) || !isExistingRailCell(end.x, end.y)) return null;
  const visited = new Map();
  const queue = [{ x: start.x, y: start.y, parent: null }];
  visited.set(start.x + "," + start.y, queue[0]);
  let goal = null;
  for (let qi = 0; qi < queue.length; qi++) {
    const cur = queue[qi];
    if (cur.x === end.x && cur.y === end.y) { goal = cur; break; }
    for (let d = 0; d < 4; d++) {
      const nx = cur.x + DX[d], ny = cur.y + DY[d];
      const k = nx + "," + ny;
      if (visited.has(k)) continue;
      if (!isExistingRailCell(nx, ny)) continue;
      const next = { x: nx, y: ny, parent: cur };
      visited.set(k, next);
      queue.push(next);
    }
  }
  if (!goal) return null;
  const cells = [];
  for (let st = goal; st; st = st.parent) cells.push({ x: st.x, y: st.y });
  cells.reverse();
  return cells;
}

// For a station, return its two narrow-end cells, choosing whichever has an external
// rail neighbor as the "entry" (where the train enters/exits) and the other as the "far"
// end (where the locomotive parks).
function stationEnds(s) {
  const cells = s.cells || [{ x: s.x, y: s.y }];
  let xMinT = Infinity, yMinT = Infinity, xMaxT = -Infinity, yMaxT = -Infinity;
  for (const c of cells) {
    if (c.x < xMinT) xMinT = c.x;
    if (c.y < yMinT) yMinT = c.y;
    if (c.x > xMaxT) xMaxT = c.x;
    if (c.y > yMaxT) yMaxT = c.y;
  }
  const horizontal = (xMaxT - xMinT) > (yMaxT - yMinT);
  let endA, endB, neighA, neighB;
  if (horizontal) {
    endA = { x: xMinT, y: yMinT };
    endB = { x: xMaxT, y: yMinT };
    neighA = { x: xMinT - 1, y: yMinT };
    neighB = { x: xMaxT + 1, y: yMinT };
  } else {
    endA = { x: xMinT, y: yMinT };
    endB = { x: xMinT, y: yMaxT };
    neighA = { x: xMinT, y: yMinT - 1 };
    neighB = { x: xMinT, y: yMaxT + 1 };
  }
  const railAt = (c) => {
    const b = buildingAt(c.x, c.y);
    return !!b && b.type === BTYPE.RAIL;
  };
  if (railAt(neighA)) return { entry: endA, far: endB };
  if (railAt(neighB)) return { entry: endB, far: endA };
  return { entry: endA, far: endB };
}

function pathStillValid(path) {
  if (!path || path.length === 0) return false;
  for (let i = 0; i < path.length; i++) {
    if (!isExistingRailCell(path[i].x, path[i].y)) return false;
  }
  return true;
}

// Single shuttle train. Created on demand once both stations exist.
let train = null;
function ensureTrain() {
  if (train) return;
  if (stations.length < 2) return;
  train = {
    status: "parked",
    parkedStationIndex: 0,
    pathCells: null,
    pathProgress: 0,
    flipped: false,        // when true, storage car is rendered as front of motion
    inventory: 0,
    itemType: null,
    outputCooldown: 0,
    schedule: [
      { stationIndex: 0, condition: "full" },
      { stationIndex: 1, condition: "empty" },
    ],
    scheduleIdx: 0,
    pos: { x: 0, y: 0 }, // pixel coords for rendering when moving
  };
  positionTrainAtStation(0);
}

function positionTrainAtStation(idx) {
  if (!stations[idx]) return;
  const s = stations[idx];
  // Place the train head at the "near" end of the station.
  train.pos.x = s.x * TILE + TILE;
  train.pos.y = s.y * TILE + TILE;
}

function tickTrain(dt) {
  if (!train) { ensureTrain(); return; }
  if (stations.length < 2) return;
  if (train.status === "parked") {
    const stop = train.schedule[train.scheduleIdx];
    if (!stop) return;
    if (train.parkedStationIndex !== stop.stationIndex) {
      // Schedule changed; re-snap to current parked station.
      train.scheduleIdx = stop.stationIndex === train.parkedStationIndex ? train.scheduleIdx : (train.scheduleIdx + 1) % train.schedule.length;
    }
    const conditionMet = (stop.condition === "full" && train.inventory >= TRAIN_INVENTORY_MAX) ||
                         (stop.condition === "empty" && train.inventory <= 0);
    if (!conditionMet) return;
    // Depart toward the next stop.
    const nextIdx = (train.scheduleIdx + 1) % train.schedule.length;
    const dest = train.schedule[nextIdx];
    if (!dest || !stations[dest.stationIndex]) return;
    const fromS = stations[train.parkedStationIndex];
    const toS = stations[dest.stationIndex];
    const fromEnds = stationEnds(fromS);
    const toEnds = stationEnds(toS);
    // Try to reuse the previous journey path reversed — guarantees the train's body
    // stays on the same physical cells so it doesn't visually collapse on departure.
    let path = null;
    if (train.pathCells && train.pathCells.length >= 2) {
      const last = train.pathCells[train.pathCells.length - 1];
      const first = train.pathCells[0];
      if (last.x === fromEnds.far.x && last.y === fromEnds.far.y &&
          first.x === toEnds.far.x && first.y === toEnds.far.y) {
        path = train.pathCells.slice().reverse();
      }
    }
    if (!path) path = findTrainPath(fromEnds.far, toEnds.far);
    if (!path || path.length < 2) { showToast("No rail path between stations"); return; }
    train.pathCells = path;
    // Seed progress to TRAIN_LENGTH so all 4 wheels start on the path (not collapsed at 0).
    const trainLen = LOCOMOTIVE_L + COUPLING_GAP + STORAGE_L;
    train.pathProgress = Math.min(trainLen, path.length - 1);
    // Flip visual roles so the cargo car appears at the front of motion (since the train is
    // physically reversing direction relative to its parked orientation).
    train.flipped = !train.flipped;
    train.status = "moving";
    train.parkedStationIndex = null;
    train.destStationIndex = dest.stationIndex;
  } else if (train.status === "moving") {
    if (!train.pathCells || train.pathCells.length === 0) { train.status = "parked"; return; }
    // If the rail track has changed under us, try to re-route from the current cell to the goal.
    if (!pathStillValid(train.pathCells)) {
      const idx = Math.max(0, Math.min(train.pathCells.length - 1, Math.floor(train.pathProgress)));
      const here = train.pathCells[idx];
      const dest = stations[train.destStationIndex];
      if (!dest || !isExistingRailCell(here.x, here.y)) {
        showToast("Train derailed");
        train.status = "parked";
        train.parkedStationIndex = train.destStationIndex;
        return;
      }
      const toEnds = stationEnds(dest);
      const newPath = findTrainPath(here, toEnds.far);
      if (!newPath || newPath.length < 2) {
        showToast("No path to destination");
        return;
      }
      train.pathCells = newPath;
      train.pathProgress = 0;
    }
    train.pathProgress += TRAIN_SPEED * dt / TILE;
    if (train.pathProgress >= train.pathCells.length - 1) {
      // Arrived: keep the journey path so the train renders smoothly through the station.
      train.pathProgress = train.pathCells.length - 1;
      train.status = "parked";
      train.parkedStationIndex = train.destStationIndex;
      train.scheduleIdx = (train.scheduleIdx + 1) % train.schedule.length;
    } else {
      const idx = Math.floor(train.pathProgress);
      const a = train.pathCells[idx];
      const bC = train.pathCells[idx + 1];
      const t = train.pathProgress - idx;
      train.pos.x = (a.x + (bC.x - a.x) * t) * TILE + TILE / 2;
      train.pos.y = (a.y + (bC.y - a.y) * t) * TILE + TILE / 2;
    }
  }
}

function tickStation(dt) {
  if (!train) return;
  if (train.status !== "parked") return;
  if (train.inventory <= 0 || train.itemType == null) return;
  if (train.outputCooldown > 0) { train.outputCooldown -= dt; return; }
  const station = stations[train.parkedStationIndex];
  if (!station) return;
  const cells = station.cells || [{ x: station.x, y: station.y }];
  for (const c of cells) {
    for (let d = 0; d < 4; d++) {
      const nx = c.x + DX[d], ny = c.y + DY[d];
      const target = buildingAt(nx, ny);
      if (!target || target === station) continue;
      if (tryAccept(target, train.itemType, d)) {
        train.inventory--;
        if (train.inventory <= 0) train.itemType = null;
        train.outputCooldown = TRAIN_OUTPUT_INTERVAL;
        return;
      }
    }
  }
}

// ============================================================
// Item routing helpers (single source of truth for "X accepts item Y from direction D")
// ============================================================
function tryAccept(target, item, fromDir) {
  if (!target) return false;
  if (target.type === BTYPE.BELT) {
    // Accept if the slot is empty AND the target isn't pointing straight back at us
    // (forbidding head-on opposite belts prevents infinite ping-pong).
    if (target.item == null && target.dir !== (fromDir + 2) % 4) {
      target.item = item;
      target.itemProgress = 0;
      return true;
    }
    return false;
  }
  if (target.type === BTYPE.SPLITTER) {
    if (target.item == null) { target.item = item; return true; }
    return false;
  }
  if (target.type === BTYPE.UNDERGROUND_BELT) {
    if (target.dir === fromDir && target.item == null) {
      const r = undergroundRole(target);
      if (r.role === "entry") { target.item = item; return true; }
    }
    return false;
  }
  if (target.type === BTYPE.ASSEMBLER) {
    if (item === ITEM.ORE && (target.buffer || 0) < 8) { target.buffer = (target.buffer || 0) + 1; return true; }
    if (item === ITEM.AMMO && (target.ammoBuf || 0) < 12) { target.ammoBuf = (target.ammoBuf || 0) + 1; return true; }
    return false;
  }
  if (target.type === BTYPE.HEAVY_ASSEMBLER) {
    if (item === ITEM.HEAVY_AMMO && (target.heavyBuf || 0) < HEAVY_ASSEMBLER_HEAVY_BUF_MAX) { target.heavyBuf = (target.heavyBuf || 0) + 1; return true; }
    if (item === ITEM.ORE && (target.buffer || 0) < HEAVY_ASSEMBLER_ORE_BUF_MAX) { target.buffer = (target.buffer || 0) + 1; return true; }
    return false;
  }
  if (target.type === BTYPE.TURRET) {
    if (item === ITEM.AMMO && target.ammo < TURRET_AMMO_MAX) { target.ammo++; return true; }
    if (item === ITEM.HEAVY_AMMO && target.ammo < TURRET_AMMO_MAX) {
      target.ammo = Math.min(TURRET_AMMO_MAX, target.ammo + HEAVY_AMMO_PER_NORMAL_TURRET);
      return true;
    }
    return false;
  }
  if (target.type === BTYPE.HEAVY_TURRET) {
    if (item === ITEM.HEAVY_AMMO && target.ammo < HEAVY_TURRET_AMMO_MAX) {
      target.ammo = Math.min(HEAVY_TURRET_AMMO_MAX, target.ammo + HEAVY_AMMO_PER_HEAVY_TURRET);
      return true;
    }
    return false;
  }
  if (target.type === BTYPE.SNIPER_TURRET) {
    if (item === ITEM.HEAVY_AMMO && target.ammo < SNIPER_TURRET_AMMO_MAX) { target.ammo++; return true; }
    return false;
  }
  if (target.type === BTYPE.ARTILLERY) {
    if (item === ITEM.SHELL && (target.ammo || 0) < ARTILLERY_SHELL_BUF_MAX) {
      target.ammo = (target.ammo || 0) + 1; return true;
    }
    return false;
  }
  if (target.type === BTYPE.STATION) {
    if (!train) return false;
    if (train.status !== "parked") return false;
    if (train.parkedStationIndex !== target.stationIndex) return false;
    if (train.inventory >= TRAIN_INVENTORY_MAX) return false;
    if (train.itemType != null && train.itemType !== item) return false;
    train.itemType = item;
    train.inventory++;
    return true;
  }
  return false;
}

// Try to deposit `item` from building `b` into any of its 4 neighbors.
// Prefers b.dir (its facing direction), then the other 3 sides.
function tryOutputAny(b, item) {
  const dirs = [b.dir, (b.dir + 1) % 4, (b.dir + 2) % 4, (b.dir + 3) % 4];
  for (const d of dirs) {
    const target = buildingAt(b.x + DX[d], b.y + DY[d]);
    if (tryAccept(target, item, d)) return true;
  }
  return false;
}

// ============================================================
// Underground belts
// ============================================================
// Each underground belt has a direction. It's an "entry" if another underground belt
// in the same direction sits 1..UNDERGROUND_BELT_RANGE tiles ahead; that one is the "exit".
// Items entering an entry teleport to the partner exit, then leave onto the belt ahead.
function undergroundRole(b) {
  for (let d = 1; d <= UNDERGROUND_BELT_RANGE; d++) {
    const n = buildingAt(b.x + DX[b.dir]*d, b.y + DY[b.dir]*d);
    if (n && n.type === BTYPE.UNDERGROUND_BELT && n.dir === b.dir) return { role: "entry", partner: n };
  }
  for (let d = 1; d <= UNDERGROUND_BELT_RANGE; d++) {
    const n = buildingAt(b.x - DX[b.dir]*d, b.y - DY[b.dir]*d);
    if (n && n.type === BTYPE.UNDERGROUND_BELT && n.dir === b.dir) return { role: "exit", partner: n };
  }
  return { role: "idle", partner: null };
}

function tickUndergroundBelts(dt) {
  // Teleport items from entries to their paired exits.
  for (const b of buildings.values()) {
    if (b.type !== BTYPE.UNDERGROUND_BELT) continue;
    if (b.item == null) continue;
    const r = undergroundRole(b);
    if (r.role !== "entry") continue;
    if (r.partner.item == null) {
      r.partner.item = b.item;
      b.item = null;
    }
  }
  // Exits push to the belt directly ahead.
  for (const b of buildings.values()) {
    if (b.type !== BTYPE.UNDERGROUND_BELT) continue;
    if (b.item == null) continue;
    const r = undergroundRole(b);
    if (r.role !== "exit") continue;
    const ahead = buildingAt(b.x + DX[b.dir], b.y + DY[b.dir]);
    if (tryAccept(ahead, b.item, b.dir)) {
      b.item = null;
    }
  }
}

// ============================================================
// Splitters
// ============================================================
function tickSplitters(dt) {
  for (const b of buildings.values()) {
    if (b.type !== BTYPE.SPLITTER) continue;
    if (b.item == null) continue;
    // Gather any neighbor that would accept the current item, in any direction.
    // Use a scratch test by attempting tryAccept on a clone field would be fragile;
    // instead, replicate the acceptance check by trying tryAccept and rolling back is
    // error-prone — we use a "dry-run" test by checking acceptance preconditions inline.
    const candidates = [];
    for (let d = 0; d < 4; d++) {
      const n = buildingAt(b.x + DX[d], b.y + DY[d]);
      if (!n) continue;
      // Cheap acceptance probe: replicate tryAccept's precondition checks without mutating.
      let ok = false;
      const item = b.item;
      if (n.type === BTYPE.BELT) ok = (n.item == null && n.dir !== (d + 2) % 4);
      else if (n.type === BTYPE.SPLITTER) ok = (n.item == null);
      else if (n.type === BTYPE.UNDERGROUND_BELT) {
        if (n.dir === d && n.item == null) {
          const r = undergroundRole(n);
          ok = (r.role === "entry");
        }
      } else if (n.type === BTYPE.ASSEMBLER) {
        ok = (item === ITEM.ORE && (n.buffer || 0) < 8) || (item === ITEM.AMMO && (n.ammoBuf || 0) < 12);
      } else if (n.type === BTYPE.TURRET) {
        ok = (item === ITEM.AMMO && n.ammo < TURRET_AMMO_MAX) || (item === ITEM.HEAVY_AMMO && n.ammo < TURRET_AMMO_MAX);
      } else if (n.type === BTYPE.HEAVY_TURRET) {
        ok = (item === ITEM.HEAVY_AMMO && n.ammo < HEAVY_TURRET_AMMO_MAX);
      } else if (n.type === BTYPE.SNIPER_TURRET) {
        ok = (item === ITEM.HEAVY_AMMO && n.ammo < SNIPER_TURRET_AMMO_MAX);
      }
      if (ok) candidates.push({ n, d });
    }
    if (candidates.length === 0) continue;
    const idx = b.outputIndex % candidates.length;
    const pick = candidates[idx];
    if (tryAccept(pick.n, b.item, pick.d)) {
      b.item = null;
      b.outputIndex = (idx + 1) % candidates.length;
    }
  }
}

// ============================================================
// Miners
// ============================================================
// True if no ore tile remains anywhere inside this big drill's 5x5 mining area.
function bigDrillDepleted(b) {
  const x0 = b.x - BIG_DRILL_RANGE, y0 = b.y - BIG_DRILL_RANGE;
  const x1 = b.x + 2 + BIG_DRILL_RANGE, y1 = b.y + 2 + BIG_DRILL_RANGE;
  for (let yy = y0; yy <= y1; yy++) {
    for (let xx = x0; xx <= x1; xx++) {
      if (oreAt(xx, yy) > 0) return false;
    }
  }
  return true;
}

// Big drill: 3x3 footprint, mines a 5x5 area, outputs through any of the 12 perimeter cells.
// 9× normal mining throughput with half the resource drain (each emitted ore costs 0.5 from a tile).
function tickBigDrills(dt) {
  const depleted = [];
  for (const b of uniqueBuildings) {
    if (b.type !== BTYPE.BIG_DRILL) continue;
    if (!("drainAccum" in b)) b.drainAccum = 0;
    if (!("outputIndex" in b)) b.outputIndex = 0;
    b.cooldown -= dt;
    while (b.cooldown <= 0) {
      // Find ore tiles in the 5x5 area centered on the drill (footprint + 1-tile ring).
      const x0 = b.x - BIG_DRILL_RANGE, y0 = b.y - BIG_DRILL_RANGE;
      const x1 = b.x + 2 + BIG_DRILL_RANGE, y1 = b.y + 2 + BIG_DRILL_RANGE;
      const oreCells = [];
      for (let yy = y0; yy <= y1; yy++) {
        for (let xx = x0; xx <= x1; xx++) {
          if (oreAt(xx, yy) > 0) oreCells.push({ x: xx, y: yy });
        }
      }
      if (oreCells.length === 0) { b.cooldown = 200; break; }
      // Build the list of perimeter output candidates (12 cells around the 3x3 footprint).
      const outs = [];
      for (let i = 0; i < 3; i++) outs.push({ x: b.x + i,     y: b.y - 1,     d: DIR.UP });
      for (let i = 0; i < 3; i++) outs.push({ x: b.x + 3,     y: b.y + i,     d: DIR.RIGHT });
      for (let i = 0; i < 3; i++) outs.push({ x: b.x + i,     y: b.y + 3,     d: DIR.DOWN });
      for (let i = 0; i < 3; i++) outs.push({ x: b.x - 1,     y: b.y + i,     d: DIR.LEFT });
      // Round-robin so output spreads evenly across all 12 sides.
      let placed = false;
      for (let attempt = 0; attempt < outs.length; attempt++) {
        const o = outs[(b.outputIndex + attempt) % outs.length];
        const target = buildingAt(o.x, o.y);
        if (tryAccept(target, ITEM.ORE, o.d)) {
          b.outputIndex = (b.outputIndex + attempt + 1) % outs.length;
          placed = true;
          break;
        }
      }
      if (!placed) { b.cooldown = 100; break; }
      // Half resource drain: spend 1 ore from a source tile every 2 emitted units.
      b.drainAccum += 0.5;
      if (b.drainAccum >= 1) {
        const pick = oreCells[Math.floor(Math.random() * oreCells.length)];
        const cur = oreAt(pick.x, pick.y);
        setOre(pick.x, pick.y, cur > 0 ? cur - 1 : 0);
        b.drainAccum -= 1;
      }
      stats.oreMined++;
      b.cooldown += BIG_DRILL_INTERVAL;
    }
    if (bigDrillDepleted(b)) depleted.push(b);
  }
  // Auto-relocate depleted drills: shift the 3x3 backward 1 tile in its facing direction
  // and lay 3 belts (facing forward) in the row that was vacated. Skip if blocked or no ore ahead.
  for (const b of depleted) {
    const dir = b.dir;
    const newX = b.x - DX[dir], newY = b.y - DY[dir];
    const newCells = [];
    for (let yy = 0; yy < 3; yy++) for (let xx = 0; xx < 3; xx++) newCells.push({ x: newX + xx, y: newY + yy });
    let ok = true;
    for (const c of newCells) {
      if (!inBounds(c.x, c.y)) { ok = false; break; }
      const occ = buildingAt(c.x, c.y);
      if (occ && occ !== b) { ok = false; break; }
    }
    if (!ok) continue;
    const x0 = newX - BIG_DRILL_RANGE, y0 = newY - BIG_DRILL_RANGE;
    const x1 = newX + 2 + BIG_DRILL_RANGE, y1 = newY + 2 + BIG_DRILL_RANGE;
    let hasOre = false;
    for (let yy = y0; yy <= y1 && !hasOre; yy++) {
      for (let xx = x0; xx <= x1; xx++) {
        if (oreAt(xx, yy) > 0) { hasOre = true; break; }
      }
    }
    if (!hasOre) continue;
    const newCellsSet = new Set(newCells.map(c => c.x + "," + c.y));
    const vacated = (b.cells || []).filter(c => !newCellsSet.has(c.x + "," + c.y));
    removeBuilding(b.x, b.y);
    for (const v of vacated) placeBuilding(BTYPE.BELT, v.x, v.y, dir);
    placeBuilding(BTYPE.BIG_DRILL, newX, newY, dir);
  }
}

function tickMiners(dt) {
  const depleted = [];
  for (const b of buildings.values()) {
    if (b.type !== BTYPE.MINER) continue;
    if (oreAt(b.x, b.y) <= 0) { depleted.push(b); continue; }
    b.cooldown -= dt;
    if (b.cooldown <= 0) {
      if (tryOutputAny(b, ITEM.ORE)) {
        const cur = oreAt(b.x, b.y);
        setOre(b.x, b.y, cur > 0 ? cur - 1 : 0);
        stats.oreMined++;
        b.cooldown = MINER_INTERVAL;
      } else {
        b.cooldown = 100;
      }
    }
  }
  // Auto-relocate depleted miners: replace miner with a belt going its facing direction,
  // and place a new miner one tile behind. Skipped if the tile behind is occupied or has no ore —
  // in that case the miner just sits with the out-of-ore indicator.
  for (const b of depleted) {
    const dir = b.dir;
    const bx = b.x - DX[dir], by = b.y - DY[dir];
    if (!inBounds(bx, by)) continue;
    if (buildingAt(bx, by)) continue;
    if (oreAt(bx, by) <= 0) continue;
    removeBuilding(b.x, b.y);
    placeBuilding(BTYPE.BELT, b.x, b.y, dir);
    placeBuilding(BTYPE.MINER, bx, by, dir);
  }
}

// ============================================================
// Assemblers
// ============================================================
function tickAssemblers(dt) {
  for (const b of buildings.values()) {
    if (b.type !== BTYPE.ASSEMBLER) continue;
    if (!("ammoBuf" in b)) b.ammoBuf = 0;
    b.cooldown -= dt;
    if (b.cooldown <= 0) {
      // Output strictly in the facing direction.
      const nx = b.x + DX[b.dir], ny = b.y + DY[b.dir];
      const next = buildingAt(nx, ny);
      // Recipe priority: heavy ammo > ammo. Shells now require a HEAVY_ASSEMBLER.
      if (b.ammoBuf >= 4 && tryAccept(next, ITEM.HEAVY_AMMO, b.dir)) {
        b.ammoBuf -= 4;
        stats.heavyAmmoProduced = (stats.heavyAmmoProduced || 0) + 1;
        b.cooldown = ASSEMBLER_INTERVAL;
        b.craftMax = ASSEMBLER_INTERVAL;
      } else if (b.buffer >= 2 && tryAccept(next, ITEM.AMMO, b.dir)) {
        b.buffer -= 2;
        stats.ammoProduced++;
        b.cooldown = ASSEMBLER_INTERVAL;
        b.craftMax = ASSEMBLER_INTERVAL;
      } else {
        b.cooldown = 100;
        b.craftMax = 0; // idle — hide progress bar
      }
    }
  }
}

function tickHeavyAssemblers(dt) {
  for (const b of buildings.values()) {
    if (b.type !== BTYPE.HEAVY_ASSEMBLER) continue;
    b.cooldown -= dt;
    if (b.cooldown <= 0) {
      // Output goes one tile past the 2x2 footprint in the facing direction.
      const nx = b.x + DX[b.dir] + (b.dir === DIR.RIGHT ? 1 : 0);
      const ny = b.y + DY[b.dir] + (b.dir === DIR.DOWN ? 1 : 0);
      const next = buildingAt(nx, ny);
      if ((b.heavyBuf || 0) >= SHELL_HEAVY_COST && (b.buffer || 0) >= SHELL_ORE_COST && tryAccept(next, ITEM.SHELL, b.dir)) {
        b.heavyBuf -= SHELL_HEAVY_COST;
        b.buffer -= SHELL_ORE_COST;
        stats.shellsProduced = (stats.shellsProduced || 0) + 1;
        b.cooldown = HEAVY_ASSEMBLER_INTERVAL;
        b.craftMax = HEAVY_ASSEMBLER_INTERVAL;
      } else {
        b.cooldown = 120;
        b.craftMax = 0;
      }
    }
  }
}

// Smoothly rotate `b.barrelAngle` toward `target` at most `maxRate` rad per ms.
// Returns true once aimed within TURRET_AIM_TOLERANCE.
function turnBarrel(b, target, maxRate, dt) {
  let delta = target - b.barrelAngle;
  while (delta > Math.PI) delta -= 2 * Math.PI;
  while (delta < -Math.PI) delta += 2 * Math.PI;
  const maxDelta = maxRate * dt;
  if (Math.abs(delta) <= maxDelta) {
    b.barrelAngle = target;
    return true;
  }
  b.barrelAngle += Math.sign(delta) * maxDelta;
  return Math.abs(delta) <= TURRET_AIM_TOLERANCE;
}

// Slow-flying artillery shells and their post-impact explosions.
const shells = [];     // { x, y, vx, vy, tx, ty }
const explosions = []; // { x, y, life, maxLife, radius }

function tickArtillery(dt) {
  const minR2 = ARTILLERY_MIN_RANGE * ARTILLERY_MIN_RANGE;
  const maxR2 = ARTILLERY_RANGE * ARTILLERY_RANGE;
  for (const b of uniqueBuildings) {
    if (b.type !== BTYPE.ARTILLERY) continue;
    const cx = (b.x + 1.5) * TILE, cy = (b.y + 1.5) * TILE;
    // Pick the IMPACT POINT that maximizes zombies inside the blast radius — i.e., the
    // densest cluster. Throttled to 5×/sec to keep cost low under heavy zombie counts.
    if (!("targetCacheT" in b)) b.targetCacheT = 0;
    b.targetCacheT -= dt;
    if (b.targetCacheT <= 0) {
      let bestX = 0, bestY = 0, bestCount = 0, bestArtilleryD2 = Infinity;
      // Candidate impact points: every zombie inside the artillery's [min, max] band.
      forEachZombieInRadius(cx, cy, ARTILLERY_RANGE, (z, d2) => {
        if (d2 < minR2) return;
        // Count zombies within blast radius of this candidate using the spatial grid.
        let count = 0;
        forEachZombieInRadius(z.x, z.y, ARTILLERY_BLAST_RADIUS, () => { count++; });
        if (count > bestCount || (count === bestCount && d2 < bestArtilleryD2)) {
          bestCount = count;
          bestX = z.x;
          bestY = z.y;
          bestArtilleryD2 = d2;
        }
      });
      b.cachedTargetX = bestX;
      b.cachedTargetY = bestY;
      b.cachedTargetCount = bestCount;
      b.targetCacheT = 200;
    }
    const haveTarget = (b.cachedTargetCount || 0) > 0;
    const bestX = b.cachedTargetX, bestY = b.cachedTargetY;
    let aimed = false;
    if (haveTarget) aimed = turnBarrel(b, Math.atan2(bestY - cy, bestX - cx), ARTILLERY_TURN_RATE, dt);
    b.cooldown -= dt;
    // Don't fire while our previous shell is still in flight.
    if (b.cooldown <= 0 && haveTarget && aimed && (b.ammo || 0) > 0 && !b.activeShell) {
      b.ammo--;
      const muzzleDist = TILE * 4;
      const mx = cx + Math.cos(b.barrelAngle) * muzzleDist;
      const my = cy + Math.sin(b.barrelAngle) * muzzleDist;
      const dx = bestX - mx, dy = bestY - my;
      const dist = Math.hypot(dx, dy) || 1;
      const shell = {
        x: mx, y: my,
        vx: dx / dist * ARTILLERY_SHELL_SPEED,
        vy: dy / dist * ARTILLERY_SHELL_SPEED,
        tx: bestX, ty: bestY,
        owner: b,
      };
      shells.push(shell);
      b.activeShell = shell;
      b.cooldown = ARTILLERY_INTERVAL;
    } else if (b.cooldown <= 0) {
      b.cooldown = 80;
    }
  }
}

function tickShells(dt) {
  // Move each shell. When it reaches its target tile (or overshoots), detonate.
  for (let i = shells.length - 1; i >= 0; i--) {
    const s = shells[i];
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    const dx = s.tx - s.x, dy = s.ty - s.y;
    // Detonate when within a half-tile of the target OR when we're moving past it
    // (dot product of remaining vector with velocity is negative).
    const dot = dx * s.vx + dy * s.vy;
    if (dx * dx + dy * dy < (TILE * 0.5) * (TILE * 0.5) || dot < 0) {
      // Boom: kill every zombie in the blast radius (spatial-grid query).
      forEachZombieInRadius(s.tx, s.ty, ARTILLERY_BLAST_RADIUS, (z) => { z.hp = 0; });
      explosions.push({ x: s.tx, y: s.ty, life: 600, maxLife: 600, radius: ARTILLERY_BLAST_RADIUS });
      if (s.owner) s.owner.activeShell = null; // free the artillery to fire again
      shells.splice(i, 1);
    }
  }
  for (let i = explosions.length - 1; i >= 0; i--) {
    explosions[i].life -= dt;
    if (explosions[i].life <= 0) explosions.splice(i, 1);
  }
}

function tickSniperTurrets(dt) {
  for (const b of uniqueBuildings) {
    if (b.type !== BTYPE.SNIPER_TURRET) continue;
    if (b.recoilT > 0) b.recoilT = Math.max(0, b.recoilT - dt);
    const cx = b.x * TILE + TILE/2, cy = b.y * TILE + TILE/2;
    let best = null, bestD = SNIPER_TURRET_RANGE * SNIPER_TURRET_RANGE;
    forEachZombieInRadius(cx, cy, SNIPER_TURRET_RANGE, (z, d2) => {
      if (d2 < bestD) { bestD = d2; best = z; }
    });
    let aimedSn = false;
    if (best) aimedSn = turnBarrel(b, Math.atan2(best.y - cy, best.x - cx), SNIPER_TURRET_TURN_RATE, dt);
    b.cooldown -= dt;
    if (b.cooldown <= 0 && best && b.ammo > 0 && aimedSn) {
      b.ammo--;
      best.hp -= SNIPER_TURRET_DMG;
      // muzzle starts ~2 tiles out from the turret center
      const mx = cx + Math.cos(b.barrelAngle) * (TILE * 2);
      const my = cy + Math.sin(b.barrelAngle) * (TILE * 2);
      bullets.push({ x1: mx, y1: my, x2: best.x, y2: best.y, life: 120 });
      b.recoilT = SNIPER_RECOIL_MS;
      b.cooldown = SNIPER_TURRET_INTERVAL;
    } else if (b.cooldown <= 0) {
      b.cooldown = 80;
    }
  }
}

function tickHeavyTurrets(dt) {
  for (const b of uniqueBuildings) {
    if (b.type !== BTYPE.HEAVY_TURRET) continue;
    const cx = b.x * TILE + TILE/2, cy = b.y * TILE + TILE/2;
    // collect zombies in range via the spatial grid, then sort by distance
    const inRange = [];
    forEachZombieInRadius(cx, cy, TURRET_RANGE, (z, d2) => { inRange.push({ z, d2 }); });
    inRange.sort((a, b2) => a.d2 - b2.d2);
    const closest = inRange[0] && inRange[0].z;
    let aimedHv = false;
    if (closest) aimedHv = turnBarrel(b, Math.atan2(closest.y - cy, closest.x - cx), HEAVY_TURRET_TURN_RATE, dt);
    b.cooldown -= dt;
    if (b.cooldown <= 0 && closest && b.ammo > 0 && aimedHv) {
      b.ammo--;
      const sprAngle = (Math.random() - 0.5) * 0.2;
      const baseAngle = Math.atan2(closest.y - cy, closest.x - cx) + sprAngle;
      const reach = Math.hypot(closest.x - cx, closest.y - cy);
      closest.hp -= HEAVY_TURRET_DMG_PER_BULLET;
      bullets.push({ x1: cx, y1: cy, x2: cx + Math.cos(baseAngle) * reach, y2: cy + Math.sin(baseAngle) * reach, life: 60 });
      b.cooldown = HEAVY_TURRET_INTERVAL;
    } else if (b.cooldown <= 0) {
      b.cooldown = 50;
    }
  }
}

// ============================================================
// Turrets & Bullets
// ============================================================
const bullets = []; // {x1,y1,x2,y2,life}

function tickTurrets(dt) {
  for (const b of uniqueBuildings) {
    if (b.type !== BTYPE.TURRET) continue;
    // Find nearest zombie in range — use spatial grid.
    let best = null, bestDist = TURRET_RANGE * TURRET_RANGE;
    const cx = b.x * TILE + TILE/2, cy = b.y * TILE + TILE/2;
    forEachZombieInRadius(cx, cy, TURRET_RANGE, (z, d2) => {
      if (d2 < bestDist) { bestDist = d2; best = z; }
    });
    b.target = best;
    let aimed = false;
    if (best) aimed = turnBarrel(b, Math.atan2(best.y - cy, best.x - cx), TURRET_TURN_RATE, dt);
    b.cooldown -= dt;
    if (b.cooldown <= 0 && best && b.ammo > 0 && aimed) {
      b.ammo--;
      best.hp -= TURRET_DMG;
      bullets.push({ x1: cx, y1: cy, x2: best.x, y2: best.y, life: 80 });
      b.cooldown = TURRET_INTERVAL;
    } else if (b.cooldown <= 0) {
      b.cooldown = 50;
    }
  }
  for (let i = bullets.length - 1; i >= 0; i--) {
    bullets[i].life -= dt;
    if (bullets[i].life <= 0) bullets.splice(i, 1);
  }
}

// ============================================================
// Zombies
// ============================================================
const zombies = []; // {x,y,hp,dead,fade,attackCd}

function nearestTarget(zx, zy) {
  let best = { x: player.x, y: player.y, isPlayer: true, building: null };
  let bestD = (player.x - zx)**2 + (player.y - zy)**2;
  for (const b of uniqueBuildings) {
    // Rails are passive track and produce many entries; zombies don't path to them.
    if (b.type === BTYPE.RAIL) continue;
    const bx = b.x * TILE + TILE/2, by = b.y * TILE + TILE/2;
    const d = (bx - zx)**2 + (by - zy)**2;
    if (d < bestD) { bestD = d; best = { x: bx, y: by, isPlayer: false, building: b }; }
  }
  return best;
}

// ============================================================
// Spatial index for zombies (rebuilt every frame) and a query helper.
// ============================================================
const ZOMBIE_CHUNK_PX = TILE * 8;
let zombieGrid = new Map();

function rebuildZombieGrid() {
  zombieGrid.clear();
  for (const z of zombies) {
    if (z.dead || z.hp <= 0) continue;
    const k = Math.floor(z.x / ZOMBIE_CHUNK_PX) + "," + Math.floor(z.y / ZOMBIE_CHUNK_PX);
    let bucket = zombieGrid.get(k);
    if (!bucket) { bucket = []; zombieGrid.set(k, bucket); }
    bucket.push(z);
  }
}

// Iterate every live zombie within `radius` px of (x, y) and call fn(z, d2).
function forEachZombieInRadius(x, y, radius, fn) {
  const r2 = radius * radius;
  const cMinX = Math.floor((x - radius) / ZOMBIE_CHUNK_PX);
  const cMaxX = Math.floor((x + radius) / ZOMBIE_CHUNK_PX);
  const cMinY = Math.floor((y - radius) / ZOMBIE_CHUNK_PX);
  const cMaxY = Math.floor((y + radius) / ZOMBIE_CHUNK_PX);
  for (let cy = cMinY; cy <= cMaxY; cy++) {
    for (let cx = cMinX; cx <= cMaxX; cx++) {
      const bucket = zombieGrid.get(cx + "," + cy);
      if (!bucket) continue;
      for (const z of bucket) {
        if (z.dead || z.hp <= 0) continue;
        const dx = z.x - x, dy = z.y - y;
        const d2 = dx*dx + dy*dy;
        if (d2 <= r2) fn(z, d2);
      }
    }
  }
}

function tickZombies(dt) {
  let nearestToPlayerD2 = Infinity;
  for (const z of zombies) {
    if (z.dead) {
      z.fade -= dt;
      continue;
    }
    // Reuse the cached target for ~800 ms; recompute when expired or when the building it
    // pointed at no longer exists. Massive cost reduction for large zombie counts.
    if (!("targetCacheT" in z)) z.targetCacheT = 0;
    z.targetCacheT -= dt;
    let target = z.cachedTarget;
    const cachedBuildingDead = target && target.building && !uniqueBuildings.has(target.building);
    if (z.targetCacheT <= 0 || !target || cachedBuildingDead) {
      target = nearestTarget(z.x, z.y);
      z.cachedTarget = target;
      z.targetCacheT = 800;
    }
    // The cached target is a snapshot for buildings (still moves for the player).
    if (target.isPlayer) { target = { x: player.x, y: player.y, isPlayer: true, building: null }; }
    const dx = target.x - z.x, dy = target.y - z.y;
    const dist = Math.hypot(dx, dy);
    const meleeRange = TILE * 0.8;
    if (dist > meleeRange) {
      const sp = z.speed || ZOMBIE_SPEED;
      const vx = dx / dist * sp * dt;
      const vy = dy / dist * sp * dt;
      // Simple collision: don't enter solid building tiles (walls/buildings except current target's building)
      const newX = z.x + vx, newY = z.y + vy;
      const tx = Math.floor(newX / TILE), ty = Math.floor(newY / TILE);
      const occ = buildingAt(tx, ty);
      if (!occ || (target.building && occ === target.building)) {
        z.x = newX; z.y = newY;
      } else {
        // attack the blocking building
        z.attackCd -= dt;
        if (z.attackCd <= 0) {
          if (occ.type === BTYPE.WALL) {
            occ.hp -= ZOMBIE_DMG_PER_SEC * 0.5;
            if (occ.hp <= 0) removeBuilding(occ.x, occ.y);
          } else {
            removeBuilding(occ.x, occ.y);
          }
          z.attackCd = 500;
        }
      }
      z.bob += dt * 0.01;
    } else {
      // attack target
      z.attackCd -= dt;
      if (z.attackCd <= 0) {
        if (target.isPlayer) {
          player.hp -= ZOMBIE_DMG_PER_SEC * 0.5;
        } else if (target.building) {
          if (target.building.type === BTYPE.WALL) {
            target.building.hp -= ZOMBIE_DMG_PER_SEC * 0.5;
            if (target.building.hp <= 0) removeBuilding(target.building.x, target.building.y);
          } else {
            removeBuilding(target.building.x, target.building.y);
          }
        }
        z.attackCd = 500;
      }
    }
    if (z.hp <= 0) { z.dead = true; z.fade = 400; }

    const pd2 = (z.x - player.x)**2 + (z.y - player.y)**2;
    if (pd2 < nearestToPlayerD2) nearestToPlayerD2 = pd2;
  }

  // Player damage from melee zombies — spatial-grid query.
  forEachZombieInRadius(player.x, player.y, TILE * 0.8, () => {
    player.hp -= PLAYER_DMG_PER_SEC * (dt / 1000);
  });

  // Regen
  if (Math.sqrt(nearestToPlayerD2) > 5 * TILE) {
    player.noZombieTimer += dt;
    if (player.noZombieTimer > 3000) {
      player.hp = Math.min(PLAYER_MAX_HP, player.hp + 1 * (dt / 1000));
    }
  } else {
    player.noZombieTimer = 0;
  }

  // Cleanup
  for (let i = zombies.length - 1; i >= 0; i--) {
    if (zombies[i].dead && zombies[i].fade <= 0) zombies.splice(i, 1);
  }

  if (player.hp <= 0 && !gameOver) triggerGameOver();
}

function firePlayerGun() {
  if (gameOver || paused) return;
  if (player.gunCooldown > 0) return;
  // Aim toward the mouse cursor (mouseX/mouseY are world coords).
  const dx = mouseX - player.x, dy = mouseY - player.y;
  const dist = Math.hypot(dx, dy) || 1;
  playerBullets.push({
    x: player.x, y: player.y,
    vx: dx / dist * PLAYER_BULLET_SPEED,
    vy: dy / dist * PLAYER_BULLET_SPEED,
    distLeft: PLAYER_BULLET_RANGE,
  });
  player.gunCooldown = PLAYER_GUN_RELOAD;
}

function tickPlayerBullets(dt) {
  if (player.gunCooldown > 0) player.gunCooldown = Math.max(0, player.gunCooldown - dt);
  for (let i = playerBullets.length - 1; i >= 0; i--) {
    const b = playerBullets[i];
    const stepX = b.vx * dt, stepY = b.vy * dt;
    const stepLen = Math.hypot(stepX, stepY);
    b.x += stepX; b.y += stepY;
    b.distLeft -= stepLen;
    // Out of range → despawn.
    if (b.distLeft <= 0) { playerBullets.splice(i, 1); continue; }
    // Wall collision (only walls block).
    const tx = Math.floor(b.x / TILE), ty = Math.floor(b.y / TILE);
    const cell = buildingAt(tx, ty);
    if (cell && cell.type === BTYPE.WALL) {
      // Damage the wall a bit and remove the bullet.
      cell.hp -= PLAYER_BULLET_DMG;
      if (cell.hp <= 0) removeBuilding(cell.x, cell.y);
      playerBullets.splice(i, 1);
      continue;
    }
    // Zombie collision — small radius, spatial-grid lookup.
    let hit = null;
    forEachZombieInRadius(b.x, b.y, TILE * 0.5, (z) => {
      if (!hit) hit = z;
    });
    if (hit) {
      hit.hp -= PLAYER_BULLET_DMG;
      playerBullets.splice(i, 1);
    }
  }
}

function spawnZombieAt(x, y, opts) {
  opts = opts || {};
  zombies.push({
    x, y,
    hp: ZOMBIE_HP,
    dead: false,
    fade: 400,
    attackCd: 0,
    bob: Math.random() * Math.PI * 2,
    speed: opts.speed || ZOMBIE_SPEED,
    isBoss: !!opts.isBoss,
  });
}

// ============================================================
// Waves
// ============================================================
const waveState = {
  waveNumber: 0,
  nextWaveAt: WAVE_FIRST_DELAY,
  spawning: false,
  spawnPoints: [],
  spawnCount: 0,
  spawned: 0,
  spawnTimer: 0,
  spawnInterval: 0,
};

function randomEdgeSpawnPoint() {
  const ax0 = xMin * TILE, ay0 = yMin * TILE, ax1 = xMax * TILE, ay1 = yMax * TILE;
  const edge = Math.floor(Math.random() * 4);
  if (edge === 0) return { x: ax0 + Math.random() * (ax1 - ax0), y: ay0 };
  if (edge === 1) return { x: ax1, y: ay0 + Math.random() * (ay1 - ay0) };
  if (edge === 2) return { x: ax0 + Math.random() * (ax1 - ax0), y: ay1 };
  return { x: ax0, y: ay0 + Math.random() * (ay1 - ay0) };
}

function startWave(now) {
  waveState.waveNumber++;
  // Expand the world on every wave start (wave 1 onward).
  growWorld();
  const isBoss = (waveState.waveNumber % 10 === 0);
  waveState.bossWave = isBoss;
  let count = 5 + waveState.waveNumber * 3;
  if (isBoss) count *= 4; // 4x zombies on boss waves
  // Hard caps: normal waves cap at 500 zombies, boss waves cap at 2000.
  count = Math.min(count, isBoss ? 2000 : 500);
  waveState.spawnCount = count;
  waveState.spawned = 0;
  waveState.spawnTimer = 0;
  // 4x more zombies in the same window = 4x spawn rate naturally.
  waveState.spawnInterval = WAVE_SPAWN_WINDOW / waveState.spawnCount;
  waveState.spawning = true;
  // Grace before the next wave: 60s + current wave number, rounded up to nearest 10s.
  const graceSeconds = Math.ceil((60 + waveState.waveNumber) / 10) * 10;
  waveState.nextWaveAt = graceSeconds * 1000;
}

function liveZombieCount() {
  let n = 0;
  for (const z of zombies) if (!z.dead) n++;
  return n;
}

function tickWaves(dt, now) {
  if (waveState.spawning) {
    waveState.spawnTimer += dt;
    while (waveState.spawned < waveState.spawnCount && waveState.spawnTimer >= waveState.spawnInterval) {
      waveState.spawnTimer -= waveState.spawnInterval;
      const p = randomEdgeSpawnPoint();
      spawnZombieAt(p.x, p.y, waveState.bossWave ? { isBoss: true, speed: ZOMBIE_SPEED * 2 } : null);
      waveState.spawned++;
    }
    if (waveState.spawned >= waveState.spawnCount) waveState.spawning = false;
  } else {
    // Only count down the next-wave timer once all zombies from the prior wave are dead.
    // The first wave (waveNumber === 0) ticks down freely (initial grace period).
    if (waveState.waveNumber === 0 || liveZombieCount() === 0) {
      waveState.nextWaveAt -= dt;
      if (waveState.nextWaveAt <= 0) startWave(now);
    }
  }
}

// ============================================================
// Save / Load
// ============================================================
